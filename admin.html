<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLOLO MASTER - Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --sidebar-bg: #0f172a; --bg-main: #f1f5f9; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-size: 1.2rem; font-weight: 800; color: var(--primary); border-bottom: 1px solid #1e293b; }
        .nav-item { padding: 15px 25px; color: #94a3b8; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #1e293b; color: white; border-left: 4px solid var(--primary); }
        .main-content { margin-left: 260px; flex: 1; padding: 40px; display: none; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 800; color: #0f172a; }
        .data-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .user-cell { display: flex; align-items: center; gap: 12px; }
        .u-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .badge-active { background: #dcfce7; color: #15803d; }
        .badge-blocked { background: #fee2e2; color: #b91c1c; }
        .badge-expired { background: #fef08a; color: #a16207; }
        .btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-quota { background: var(--primary); color: white; }
        .btn-block { background: #ef4444; color: white; }
        .btn-unblock { background: #22c55e; color: white; }
        .btn-del { background: #f1f5f9; color: #64748b; }
        
        /* Formulaire de connexion */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; box-sizing: border-box; }
        .login-card h2 { margin-top: 0; margin-bottom: 24px; color: #0f172a; font-weight: 800; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #64748b; font-size: 0.9rem; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="login-overlay">
    <div class="login-card">
        <h2>BOLOLO MASTER</h2>
        <div class="form-group">
            <label for="username">Utilisateur</label>
            <input type="text" id="username" placeholder="Entrez l'utilisateur">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" placeholder="Entrez le mot de passe">
        </div>
        <button class="btn-login" onclick="handleLogin()">Se connecter</button>
        <div id="error-zone" class="error-msg">Identifiants incorrects.</div>
    </div>
</div>

<div class="sidebar" id="sidebar-menu" style="display:none;">
    <div class="sidebar-header">BOLOLO MASTER</div>
    <div class="nav-item active">👤 Utilisateurs</div>
</div>

<div class="main-content" id="main-panel">
    <header>
        <h1>Gestion des Boutiques</h1>
        <button class="btn btn-quota" onclick="refreshList()">Actualiser</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><h3>Inscrits</h3><p id="stat-users">0</p></div>
        <div class="stat-card"><h3>Articles</h3><p id="stat-articles">0</p></div>
        <div class="stat-card"><h3>Bloqués</h3><p id="stat-blocked" style="color:#ef4444">0</p></div>
    </div>

    <div class="data-card">
        <table>
            <thead>
                <tr>
                    <th>UTILISATEUR</th>
                    <th>PRIORITÉ (5 MAX)</th>
                    <th>DURÉE PRIVILÈGE</th>
                    <th>STATUT</th>
                    <th>ARTICLES</th>
                    <th>QUOTA</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === "mirdime" && p === "Himz1988") {
            sessionStorage.setItem("admin_logged", "true");
            showAdminPanel();
        } else {
            document.getElementById('error-zone').style.display = "block";
        }
    }

    function showAdminPanel() {
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('sidebar-menu').style.display = "flex";
        document.getElementById('main-panel').style.display = "block";
        refreshList();
    }

    function checkSession() {
        if(sessionStorage.getItem("admin_logged") === "true") {
            showAdminPanel();
        }
    }

    function refreshList() {
        if(sessionStorage.getItem("admin_logged") !== "true") return;
        
        const tbody = document.getElementById('user-list');
        db.ref('accounts').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const accounts = Object.values(data);
            const now = Date.now();

            // Vérification et nettoyage automatique des privilèges expirés
            accounts.forEach(a => {
                if(a.priority && a.priorityExpires && now > a.priorityExpires) {
                    a.priority = false;
                    db.ref('accounts/' + a.tel).update({ priority: false, priorityExpires: null });
                }
            });

            const priorityCount = accounts.filter(a => a.priority).length;

            document.getElementById('stat-users').innerText = accounts.length;
            document.getElementById('stat-blocked').innerText = accounts.filter(a => a.blocked).length;
            document.getElementById('stat-articles').innerText = accounts.reduce((sum, a) => sum + (a.catalog ? a.catalog.length : 0), 0);

            tbody.innerHTML = accounts.map((user) => {
                let durationText = "-";
                if(user.priority && user.priorityExpires) {
                    const timeLeft = user.priorityExpires - now;
                    const daysLeft = Math.ceil(timeLeft / (1000 * 60 * 60 * 24));
                    durationText = daysLeft > 0 ? `<span class="badge badge-active">${daysLeft} j restants</span>` : `<span class="badge badge-expired">Expiré</span>`;
                }

                return `
                <tr>
                    <td>
                        <div class="user-cell">
                            <img src="${user.shopLogo || 'https://via.placeholder.com/45'}" class="u-logo">
                            <div>
                                <div style="font-weight:700;">${user.shopName || 'Boutique'}</div>
                                <div style="font-size:0.75rem; color:#64748b;">${user.tel}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <input type="checkbox" ${user.priority ? 'checked' : ''} 
                        onclick="togglePriority('${user.tel}', ${user.priority || false}, ${priorityCount})">
                    </td>
                    <td><b>${durationText}</b></td>
                    <td>
                        <span class="badge ${user.blocked ? 'badge-blocked' : 'badge-active'}">
                            ${user.blocked ? 'BLOQUÉ' : 'ACTIF'}
                        </span>
                    </td>
                    <td><b>${user.catalog ? user.catalog.length : 0}</b></td>
                    <td><b style="color:var(--primary)">${user.limit || 5}</b></td>
                    <td>
                        <button class="btn btn-quota" onclick="updateQuota('${user.tel}', ${user.limit || 5})">Quota</button>
                        <button class="btn ${user.blocked ? 'btn-unblock' : 'btn-block'}" onclick="toggleBlock('${user.tel}', ${user.blocked})">
                            ${user.blocked ? 'Débloquer' : 'Bloquer'}
                        </button>
                        <button class="btn btn-del" onclick="deleteUser('${user.tel}')">🗑️</button>
                    </td>
                </tr>
            `}).join('');
        });
    }

    function togglePriority(tel, current, totalPriority) {
        if (!current) {
            if (totalPriority >= 5) {
                alert("Maximum 5 vitrines prioritaires autorisées.");
                refreshList();
                return;
            }
            const days = prompt("Attribuer la priorité pour combien de jours ?");
            if (days && !isNaN(days) && parseInt(days) > 0) {
                const expireTimestamp = Date.now() + (parseInt(days) * 24 * 60 * 60 * 1000);
                db.ref('accounts/' + tel).update({ priority: true, priorityExpires: expireTimestamp });
            } else {
                refreshList();
            }
        } else {
            db.ref('accounts/' + tel).update({ priority: false, priorityExpires: null });
        }
    }

    function toggleBlock(tel, currentStatus) { db.ref('accounts/' + tel).update({ blocked: !currentStatus }); }
    function updateQuota(tel, currentQuota) {
        const n = prompt("Nouveau quota pour " + tel, currentQuota);
        if (n !== null) db.ref('accounts/' + tel).update({ limit: parseInt(n) });
    }
    function deleteUser(tel) { if(confirm("Supprimer définitivement ?")) db.ref('accounts/' + tel).remove(); }

    checkSession();
</script>
</body>
</html>
