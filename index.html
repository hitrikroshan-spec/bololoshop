<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BOLOLO Pro">
   <link rel="apple-touch-icon" href="bololo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg: #f1f5f9;
            --text: #1e293b;
        }

        /* THEMES */
        body.theme-glamour { --primary: #a855f7; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #64748b; --glam: linear-gradient(135deg, #334155 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text);
            /* Empêche le rebond du scroll sur iOS */
            overscroll-behavior-y: contain;
        }

        /* FORMAT IPHONE XS */
        .iphone-xs-screen { 
            width: 375px; 
            height: 812px; 
            background: white; 
            border-radius: 40px;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        
        body.theme-dark .iphone-xs-screen { background: #0f172a; }

        header { 
            background: var(--glam); 
            color: white; 
            /* paddingTop ajusté pour l'encoche iPhone XS */
            padding: 55px 20px 15px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 0.9rem; 
            position: relative; 
        }

        .btn-logout { position: absolute; right: 15px; bottom: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; cursor: pointer; }

        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); -webkit-overflow-scrolling: touch; }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        body.theme-dark .card { background: #1e293b; border-color: #334155; }

        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; margin: 10px auto; min-width: 140px; min-height: 140px; border: 1px solid #eee; }

        .tab-bar { display: flex; gap: 5px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-item { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; font-size: 0.7rem; color: #999; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .duo-display-area { width: 100%; height: 200px; background: #fff; border: 2px solid #ddd; border-radius: 25px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .scanner-layer { display: none; width: 100%; height: 100%; background: #000; position: absolute; top: 0; left: 0; }
        .scan-line { width: 100%; height: 4px; background: #22c55e; position: absolute; animation: scanAnim 3s infinite ease-in-out; }
        @keyframes scanAnim { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; /* Taille 16px pour éviter le zoom auto sur iOS */ background: #fff; color: #000; }
        label { font-size: 0.65rem; font-weight: bold; color: var(--primary); display: block; margin-bottom: 4px; padding-left: 5px; }

        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        
        /* Barre de navigation basse adaptée iOS */
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; /* Zone Home Indicator iOS */ } 
        body.theme-dark .nav-bar { background: #0f172a; border-color: #334155; }
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        .hidden { display: none !important; }

        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #eee; }
        .product-img-container { width: 100%; height: 180px; background: #f8fafc; display: flex; align-items: center; justify-content: center; }
        .product-img-display { max-width: 100%; max-height: 100%; object-fit: contain; }

        .login-logo-wrapper { text-align: center; margin-top: 35px; padding-bottom: 10px; }
        .login-logo-img { max-width: 150px; height: auto; opacity: 0.85; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <span id="title-text">BOLOLO SHOP - XS</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content">
        <div id="view-auth">
            <div class="tab-bar">
                <span id="t-login" class="tab-item active" onclick="switchTab('login')">LOGIN</span>
                <span id="t-signup" class="tab-item" onclick="switchTab('signup')">CREER</span>
                <span id="t-shop" class="tab-item" onclick="switchTab('shop')">VISITE</span>
            </div>
            
            <div id="area-login">
                <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
                <div class="login-logo-wrapper">
                    <img src="bololo.png" alt="BOLOLO Logo" class="login-logo-img">
                </div>
            </div>

            <div id="area-signup" class="hidden">
                <label>VOTRE NUMERO</label>
                <input type="tel" id="s-tel" placeholder="Ex: 70000000" oninput="drawQR('s-tel', 'qr-signup')">
                <center><div id="qr-signup" class="qr-box"></div></center>
                <input type="password" id="s-pass" placeholder="Mot de passe">
                <input type="password" id="s-confirm" placeholder="Confirmer mot de passe">
                <button class="btn-action" onclick="switchTab('login')">CREER LE COMPTE</button>
            </div>

            <div id="area-shop" class="hidden">
                <div class="duo-display-area" onclick="toggleScan()">
                    <div id="scanner" class="scanner-layer"><div class="scan-line"></div></div>
                    <div id="qr-visite" class="qr-box"></div>
                </div>
                <input type="tel" id="v-tel" placeholder="Numéro boutique à visiter" oninput="drawQR('v-tel', 'qr-visite')">
            </div>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align: center;">
                <label>QR CODE PERSONNEL</label>
                <div id="qr-admin" class="qr-box"></div>
            </div>
            <div class="card">
                <label>THEME</label>
                <select id="theme-selector" onchange="changeTheme()">
                    <option value="theme-glamour">✨ Glamour</option>
                    <option value="theme-feminin">🌸 Féminin</option>
                    <option value="theme-masculin">👔 Masculin</option>
                    <option value="theme-dark">🌙 Sombre</option>
                </select>
                <label>BOUTIQUE</label>
                <input type="file" accept="image/*" onchange="handleLogo(event)">
                <input type="text" id="set-name" placeholder="Nom Boutique">
                <input type="tel" id="set-tel" placeholder="Téléphone">
                <button class="btn-action" onclick="alert('Sauvegardé')">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <label>PUBLIER ARTICLE</label>
                <input type="text" id="p-name" placeholder="Nom">
                <input type="number" id="p-price" placeholder="Prix">
                <input type="file" accept="image/*" onchange="handleProdImg(event)">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div id="shop-header" style="text-align:center; padding:10px;"></div>
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>ARTICLES</div>
        <div class="nav-item" onclick="showSection('view', this); renderShop();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    let currentLogo = "";
    let currentProdImg = "";
    let catalog = [];
    let currentUserTel = "";

    function drawQR(inputId, containerId) {
        const val = document.getElementById(inputId).value;
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        if(val.length >= 4) {
            new QRCode(container, { text: val, width: 120, height: 120 });
        }
    }

    function switchTab(t) {
        ['login', 'signup', 'shop'].forEach(id => {
            document.getElementById('area-'+id).classList.add('hidden');
            document.getElementById('t-'+id).classList.remove('active');
        });
        document.getElementById('area-'+t).classList.remove('hidden');
        document.getElementById('t-'+t).classList.add('active');
    }

    function toggleScan() {
        const s = document.getElementById('scanner');
        const q = document.getElementById('qr-visite');
        s.style.display = (s.style.display === "block") ? "none" : "block";
        q.style.display = (s.style.display === "block") ? "none" : "block";
    }

    function doLogin() {
        currentUserTel = document.getElementById('l-tel').value;
        if(!currentUserTel) return alert("Numéro requis");
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('bottom-nav').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        showSection('params', document.querySelector('.nav-item'));
        setTimeout(() => {
            document.getElementById('set-tel').value = currentUserTel;
            new QRCode(document.getElementById('qr-admin'), { text: currentUserTel, width: 140, height: 140 });
        }, 100);
    }

    function changeTheme() {
        const theme = document.getElementById('theme-selector').value;
        document.body.className = theme;
    }

    function handleLogo(e) {
        const reader = new FileReader();
        reader.onload = () => currentLogo = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    function handleProdImg(e) {
        const reader = new FileReader();
        reader.onload = () => currentProdImg = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!name || !price) return alert("Infos manquantes");
        catalog.push({ name, price, desc: document.getElementById('p-desc').value, img: currentProdImg, comments: [] });
        currentProdImg = "";
        alert("Article ajouté !");
        renderAdminList();
    }

    function renderAdminList() {
        const div = document.getElementById('admin-list');
        div.innerHTML = catalog.map((item, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>${item.name}</span>
                <button onclick="catalog.splice(${i},1);renderAdminList();" style="color:red; border:none; background:none; cursor:pointer;">Supprimer</button>
            </div>
        `).join('');
    }

    function renderShop() {
        const h = document.getElementById('shop-header');
        h.innerHTML = `${currentLogo ? `<img src="${currentLogo}" style="width:200px;">` : ''} <h3>${document.getElementById('set-name').value || 'Ma Boutique'}</h3>`;
        const list = document.getElementById('shop-list');
        list.innerHTML = catalog.map((item, i) => `
            <div class="product-card">
                <div class="product-img-container">${item.img ? `<img src="${item.img}" class="product-img-display">` : 'Image'}</div>
                <div style="padding:15px;">
                    <b>${item.name}</b> - <span style="color:var(--primary)">${item.price} FCFA</span>
                    <p style="font-size:0.7rem; margin:5px 0;">${item.desc}</p>
                    <div style="background:#f1f5f9; padding:8px; border-radius:8px; font-size:0.6rem;">
                        ${item.comments.map(c => `<div>💬 ${c}</div>`).join('')}
                        <input type="text" id="comm-${i}" placeholder="Commenter..." style="width:65%; margin-top:5px; padding:4px;">
                        <button onclick="addComm(${i})" style="padding:4px;">OK</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function addComm(i) {
        const val = document.getElementById('comm-'+i).value;
        if(val) { catalog[i].comments.push(val); renderShop(); }
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'articles') renderAdminList();
    }
</script>
</body>
</html>
