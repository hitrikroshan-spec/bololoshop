
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro - Design Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #a855f7;
            --gradient: linear-gradient(180deg, #b784e8 0%, #9061f9 100%);
            --white: #ffffff;
            --text-light: rgba(255, 255, 255, 0.9);
            --bg-gray: #f8fafc;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e2e8f0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* Conteneur principal style iPhone */
        .app-container {
            width: 100%; max-width: 380px;
            height: 100vh; max-height: 800px;
            background: var(--gradient);
            position: relative; overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            color: white;
        }

        /* Formes de fond */
        .bg-shape {
            position: absolute; width: 150%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            top: 20%; left: -25%; border-radius: 40%;
            transform: rotate(-10deg); z-index: 1;
        }

        .content-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            height: 100%; box-sizing: border-box;
        }

        /* Header */
        .app-header {
            padding: 50px 25px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo-box {
            width: 60px; height: 60px;
            background: white; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .logo-box img { width: 70%; }

        /* Vues */
        .scroll-view {
            flex: 1; overflow-y: auto;
            padding: 20px; padding-bottom: 100px;
            scrollbar-width: none;
        }
        .scroll-view::-webkit-scrollbar { display: none; }

        /* Formulaires */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 25px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2);
        }

        input, select, textarea {
            width: 100%; background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px; border-radius: 12px;
            color: white; margin-bottom: 15px; outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }
        select option { color: black; }

        .btn-white {
            width: 100%; background: white; color: var(--primary);
            border: none; padding: 15px; border-radius: 30px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-white:active { transform: scale(0.95); }

        /* Stories & Catalogue */
        .story-container { display: flex; gap: 15px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; }
        .story-circle { 
            width: 65px; height: 65px; border-radius: 50%; 
            border: 3px solid white; object-fit: cover; background: white;
        }

        .product-card {
            background: white; border-radius: 20px; overflow: hidden;
            margin-bottom: 20px; color: #333;
        }
        .product-img { width: 100%; height: 250px; object-fit: cover; }
        .product-info { padding: 15px; }

        /* Navigation */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(255,255,255,0.95);
            display: flex; padding: 15px 0 30px;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            z-index: 100;
        }
        .nav-item { flex: 1; text-align: center; color: #94a3b8; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .hidden { display: none !important; }
        .qr-box { background: white; padding: 10px; border-radius: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="bg-shape"></div>

    <div class="content-wrapper">
        
        <div id="view-auth" class="scroll-view">
            <center>
                <div class="logo-box" style="margin-top: 40px;">
                    <img src="bololo.png" alt="Logo">
                </div>
                <h1 style="font-size: 2.2rem; margin: 20px 0 40px;">BOLOLO Pro</h1>
            </center>

            <div id="area-login">
                <h2 style="margin-bottom: 25px;">Connexion</h2>
                <div style="display: flex; gap: 10px;">
                    <select id="l-prefix" style="width: 100px;">
                        <option value="+226">🇧🇫 +226</option>
                        <option value="+225">🇨🇮 +225</option>
                    </select>
                    <input type="tel" id="l-tel" placeholder="Téléphone">
                </div>
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button class="btn-white" onclick="doLogin()">SE CONNECTER</button>
                <p onclick="switchTab('signup')" style="text-align: center; font-size: 0.9rem; cursor: pointer; margin-top: 20px;">
                    Pas de compte ? <b>Créer un compte</b>
                </p>
                <button class="btn-white" style="background: rgba(255,255,255,0.2); color: white; margin-top: 10px;" onclick="openVitrineDirect()">🛍️ VITRINE PUBLIQUE</button>
            </div>

            <div id="area-signup" class="hidden">
                <h2 style="margin-bottom: 25px;">Inscription</h2>
                <div style="display: flex; gap: 10px;">
                    <select id="s-prefix" onchange="updateFullTel()">
                        <option value="+226">🇧🇫 +226</option>
                        <option value="+225">🇨🇮 +225</option>
                    </select>
                    <input type="tel" id="s-tel" placeholder="Votre numéro" oninput="updateFullTel()">
                </div>
                <center><div id="qr-signup" class="qr-box" style="margin-bottom: 15px;"></div></center>
                <input type="password" id="s-pass" placeholder="Mot de passe">
                <input type="password" id="s-confirm" placeholder="Confirmer mot de passe">
                <button class="btn-white" onclick="doSignup()">CRÉER MON COMPTE</button>
                <p onclick="switchTab('login')" style="text-align: center; font-size: 0.9rem; cursor: pointer; margin-top: 20px;">Retour à la connexion</p>
            </div>
        </div>

        <div id="view-main" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
            <div class="app-header">
                <span id="display-shop-name" style="font-weight: bold; font-size: 1.2rem;">Ma Boutique</span>
                <button onclick="location.reload()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 10px;">Quitter</button>
            </div>

            <div class="scroll-view">
                <div id="dash-params" class="dash-section">
                    <center><div id="qr-admin" class="qr-box" style="margin-bottom: 20px;"></div></center>
                    <div class="card">
                        <label>Nom de la Boutique</label>
                        <input type="text" id="set-name" placeholder="Nom de votre shop">
                        <label>Logo de la Boutique</label>
                        <input type="file" accept="image/*" onchange="handleLogo(event)">
                        <button class="btn-white" onclick="saveSettings()">ENREGISTRER LES INFOS</button>
                    </div>
                </div>

                <div id="dash-articles" class="dash-section hidden">
                    <div class="card">
                        <h3>Ajouter un Article</h3>
                        <input type="text" id="p-name" placeholder="Nom du produit">
                        <input type="number" id="p-price" placeholder="Prix (FCFA)">
                        <textarea id="p-desc" placeholder="Description..."></textarea>
                        <input type="file" id="p-img-input" accept="image/*" onchange="handleProdImg(event)">
                        <button class="btn-white" onclick="addProduct()">PUBLIER L'ARTICLE</button>
                    </div>
                    <div id="admin-list"></div>
                </div>

                <div id="dash-view" class="dash-section hidden">
                    <input type="text" id="search-input" placeholder="Rechercher une boutique..." oninput="autoComplete(this.value)">
                    <div id="user-stories" class="story-container"></div>
                    <div id="shop-header" style="margin-bottom: 20px;"></div>
                    <div id="shop-list"></div>
                </div>
            </div>

            <nav class="nav-bar">
                <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
                <div class="nav-item" onclick="showSection('articles', this)">📦<br>STOCK</div>
                <div class="nav-item" onclick="showSection('view', this); viewCurrentShop();">🛒<br>VITRINE</div>
            </nav>
        </div>

    </div>
</div>

<script>
    // Config Firebase
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null, viewedTel = "", tempLogo = "", tempProdImg = "", userVotes = {};

    // --- AUTHENTIFICATION ---
    function switchTab(tab) {
        document.getElementById('area-login').classList.toggle('hidden', tab !== 'login');
        document.getElementById('area-signup').classList.toggle('hidden', tab !== 'signup');
    }

    function updateFullTel() {
        const full = document.getElementById('s-prefix').value + document.getElementById('s-tel').value;
        const cont = document.getElementById('qr-signup');
        cont.innerHTML = "";
        if(full.length > 8) new QRCode(cont, { text: full, width: 100, height: 100 });
    }

    function doLogin() {
        const fullTel = document.getElementById('l-prefix').value + document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        
        db.ref('accounts/' + fullTel).once('value', snap => {
            const user = snap.val();
            if (user && user.pass === pass) {
                currentUser = user;
                viewedTel = fullTel;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-main').classList.remove('hidden');
                document.getElementById('display-shop-name').innerText = user.shopName || "Ma Boutique";
                new QRCode(document.getElementById('qr-admin'), { text: fullTel, width: 120, height: 120 });
                renderAdminList();
            } else {
                alert("Identifiants incorrects");
            }
        });
    }

    function doSignup() {
        const fullTel = document.getElementById('s-prefix').value + document.getElementById('s-tel').value;
        const pass = document.getElementById('s-pass').value;
        const confirm = document.getElementById('s-confirm').value;

        if(pass !== confirm) return alert("Les mots de passe ne correspondent pas");
        
        db.ref('accounts/'+fullTel).set({
            tel: fullTel, pass: pass, shopName: "Ma Boutique", shopLogo: "", catalog: []
        }).then(() => {
            alert("Compte créé !");
            switchTab('login');
        });
    }

    // --- NAVIGATION ---
    function showSection(id, el) {
        document.querySelectorAll('.dash-section').forEach(s => s.classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'view') renderStories();
    }

    // --- GESTION ARTICLES ---
    function handleLogo(e) { const r = new FileReader(); r.onload = () => tempLogo = r.result; r.readAsDataURL(e.target.files[0]); }
    function handleProdImg(e) { const r = new FileReader(); r.onload = () => tempProdImg = r.result; r.readAsDataURL(e.target.files[0]); }

    function saveSettings() {
        db.ref('accounts/'+currentUser.tel).update({
            shopName: document.getElementById('set-name').value,
            shopLogo: tempLogo || currentUser.shopLogo || ""
        }).then(() => alert("Profil mis à jour !"));
    }

    function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(!name || !price) return alert("Remplissez les champs");

        db.ref('accounts/'+currentUser.tel+'/catalog').once('value', s => {
            let cat = s.val() || [];
            cat.push({ id: Date.now(), name, price, desc: document.getElementById('p-desc').value, img: tempProdImg, likes:0 });
            db.ref('accounts/'+currentUser.tel+'/catalog').set(cat).then(() => {
                alert("Article ajouté !");
                renderAdminList();
            });
        });
    }

    function renderAdminList() {
        db.ref('accounts/'+currentUser.tel+'/catalog').on('value', s => {
            const data = s.val() || [];
            document.getElementById('admin-list').innerHTML = data.map((it, i) => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; background: white; color: black;">
                    <span>${it.name} - ${it.price} F</span>
                    <button onclick="deleteProduct(${i})" style="color:red; background:none; border:none; font-size:1.2rem;">🗑️</button>
                </div>
            `).join('');
        });
    }

    function deleteProduct(i) {
        if(confirm("Supprimer cet article ?")) {
            db.ref('accounts/'+currentUser.tel+'/catalog').once('value', s => {
                let cat = s.val(); cat.splice(i,1);
                db.ref('accounts/'+currentUser.tel+'/catalog').set(cat);
            });
        }
    }

    // --- VUE CLIENT / VITRINE ---
    function openVitrineDirect() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-main').classList.remove('hidden');
        showSection('view', document.querySelectorAll('.nav-item')[2]);
    }

    function renderStories() {
        db.ref('accounts').once('value', snap => {
            const users = snap.val();
            document.getElementById('user-stories').innerHTML = Object.values(users).map(u => `
                <div style="text-align:center;" onclick="viewShop('${u.tel}')">
                    <img src="${u.shopLogo || 'https://cdn-icons-png.flaticon.com/512/870/870624.png'}" class="story-circle">
                    <div style="font-size:10px; margin-top:5px;">${u.shopName}</div>
                </div>
            `).join('');
        });
    }

    function viewShop(tel) {
        viewedTel = tel;
        db.ref('accounts/' + tel).on('value', snap => {
            const u = snap.val();
            document.getElementById('shop-header').innerHTML = `<h3 style="text-align:center; background:white; color:var(--primary); padding:10px; border-radius:15px;">${u.shopName}</h3>`;
            document.getElementById('shop-list').innerHTML = (u.catalog || []).map(it => `
                <div class="product-card">
                    <img src="${it.img || ''}" class="product-img">
                    <div class="product-info">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${it.name}</b>
                            <span style="color:var(--primary); font-weight:bold;">${it.price} FCFA</span>
                        </div>
                        <p style="font-size:0.8rem; color: #666;">${it.desc || ''}</p>
                        <button onclick="alert('Contactez le vendeur au ${u.tel}')" class="btn-white" style="background:var(--primary); color:white; padding:8px;">Contacter</button>
                    </div>
                </div>
            `).join('');
        });
    }

    function viewCurrentShop() { if(currentUser) viewShop(currentUser.tel); }

</script>
</body>
</html>
