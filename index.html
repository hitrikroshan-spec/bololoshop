<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .iphone-xs-screen { width: 375px; height: 812px; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: 55px 20px 15px; text-align: center; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
        
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }

        /* REDIMENSIONNEMENT AUTOMATIQUE DES IMAGES DU MARCHÉ */
        .img-container { width: 100%; height: 250px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; } /* L'image s'adapte sans être coupée */

        /* STYLE DES ARTICLES DANS L'ONGLET AJOUTER */
        .my-item { display: flex; align-items: center; gap: 15px; background: white; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        .my-item img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        
        .plan-box { border: 2px solid #eee; padding: 12px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .plan-box:active { background: #f5f3ff; border-color: var(--primary); }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="iphone-xs-screen">
    <header>BOLOLO Pro</header>
    
    <div class="content">
        <div id="view-auth">
            <h2 style="text-align:center;">Bienvenue</h2>
            <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center; background: var(--glam); color:white; padding: 20px;">
                <h1 id="user-balance">0 BLL</h1>
                <p>SOLDE ACTUEL</p>
            </div>
            <h3>Augmenter mon Quota</h3>
            <div class="plan-box" onclick="buyPlan('Bronze', 500, 20)">🥉 <b>BRONZE</b> (500 BLL) - 20 articles</div>
            <div class="plan-box" onclick="buyPlan('Argent', 1200, 50)">🥈 <b>ARGENT</b> (1200 BLL) - 50 articles</div>
            <div class="plan-box" onclick="buyPlan('Or', 3000, 100)">🥇 <b>OR</b> (3000 BLL) - 100 articles</div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <h3>Publier un article</h3>
                <input type="text" id="p-name" placeholder="Nom de l'article">
                <input type="number" id="p-price" placeholder="Prix (BLL)">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" accept="image/*" onchange="handleFile(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER L'ARTICLE</button>
            </div>

            <h3 style="margin-top:20px;">Gestion de mes articles</h3>
            <div id="my-articles-list">
                </div>
        </div>

        <div id="dash-view" class="hidden">
            <div id="market-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>AJOUTER</div>
        <div class="nav-item" onclick="showSection('view', this)">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let tempImg = "";

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', snap => {
            const u = snap.val();
            if(u && u.pass === pass) {
                currentUser = u;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                showSection('params', document.querySelectorAll('.nav-item')[0]);
                syncData();
            } else alert("Identifiants incorrects");
        });
    }

    function syncData() {
        db.ref('accounts/' + currentUser.tel).on('value', snap => {
            currentUser = snap.val();
            document.getElementById('user-balance').innerText = (currentUser.balance || 0) + " BLL";
            renderMyArticles(); 
            renderMarket();
        });
    }

    // --- AFFICHAGE AVEC BOUTON SUPPRIMER ---
    function renderMyArticles() {
        const cat = currentUser.catalog || [];
        let html = "";
        cat.forEach((it, i) => {
            html += `
            <div class="my-item">
                <img src="${it.img || 'bololo.png'}">
                <div style="flex:1"><b>${it.name}</b><br><small>${it.price} BLL</small></div>
                <button class="btn-del" onclick="deleteItem(${i})">Supprimer</button>
            </div>`;
        });
        document.getElementById('my-articles-list').innerHTML = html || "<p style='text-align:center;'>Aucun article en ligne.</p>";
    }

    function deleteItem(index) {
        if(confirm("Supprimer cet article définitivement ?")) {
            let cat = [...currentUser.catalog];
            cat.splice(index, 1);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
        }
    }

    function addProduct() {
        const cat = currentUser.catalog || [];
        if(cat.length >= (currentUser.limit || 5)) return alert("Quota atteint !");
        
        const newItem = {
            id: Date.now(),
            name: document.getElementById('p-name').value,
            price: parseInt(document.getElementById('p-price').value),
            desc: document.getElementById('p-desc').value,
            img: tempImg
        };
        
        cat.push(newItem);
        db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => {
            alert("Article publié !");
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            tempImg = "";
        });
    }

    function renderMarket() {
        db.ref('accounts').once('value', snap => {
            const all = snap.val();
            let html = "";
            for(let tel in all) {
                (all[tel].catalog || []).forEach(it => {
                    html += `
                    <div class="card" style="padding:0; overflow:hidden;">
                        <div class="img-container">
                            <img src="${it.img || 'bololo.png'}" class="product-img">
                        </div>
                        <div style="padding:15px;">
                            <div style="display:flex; justify-content:space-between;">
                                <b>${it.name}</b>
                                <b style="color:var(--primary)">${it.price} BLL</b>
                            </div>
                            <p style="font-size:0.8rem; color:gray;">${it.desc || ''}</p>
                            <button class="btn-action" onclick="alert('Contact: ${tel}')">COMMANDER</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('market-list').innerHTML = html;
        });
    }

    function buyPlan(name, price, limit) {
        if(currentUser.balance < price) return alert("Solde insuffisant");
        if(confirm(`Activer le forfait ${name} pour ${price} BLL ?`)) {
            db.ref('accounts/' + currentUser.tel).update({
                balance: currentUser.balance - price,
                limit: limit,
                plan: name
            });
        }
    }

    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = () => { tempImg = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
