<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #008080; 
            --bg: #f8fafb; 
            --text: #1a1a1a; 
            --glam: linear-gradient(135deg, #008080 0%, #ffffff 100%);
        }

        body.theme-glamour { --primary: #008080; --glam: var(--glam); --bg: #f8fafb; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #008080; --glam: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; color: var(--text); overscroll-behavior: none; }

        .iphone-xs-screen { width: 100%; max-width: 400px; height: 100vh; background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.15); }
        
        header { background: var(--glam); color: white; padding: 60px 20px 20px; text-align: center; font-weight: bold; font-size: 1.2rem; position: relative; z-index: 1001; }

        .btn-logout { position: absolute; right: 15px; bottom: 18px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; font-weight: bold; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); position: relative; }
        
        /* SECTION STATIQUE EN HAUT DE LA VUE */
        .sticky-header { 
            position: sticky; 
            top: -20px; 
            background: var(--bg); 
            z-index: 1000; 
            margin: -20px -20px 15px -20px; 
            padding: 20px 20px 10px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* AUTOCOMPLETE RESULTS */
        .search-container { position: relative; }
        .autocomplete-results { 
            position: absolute; top: 45px; left: 0; right: 0; 
            background: white; border-radius: 12px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            z-index: 1100; max-height: 200px; overflow-y: auto; 
            border: 1px solid #eee; 
        }
        .suggestion-item { 
            display: flex; align-items: center; gap: 10px; padding: 10px; 
            cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #000;
        }
        .suggestion-item img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        .stories-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-item { flex: 0 0 70px; text-align: center; cursor: pointer; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; background: white; }
        .story-name { font-size: 10px; font-weight: bold; display: block; margin-top: 5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 25px; border: 1px solid #eee; }
        .product-img-display { width: 100%; height: auto; max-height: 400px; object-fit: contain; background: #fafafa; }
        
        .interactions { display: flex; gap: 20px; padding: 12px; border-top: 1px solid #eee; }
        .btn-vote { border: none; background: none; cursor: pointer; font-size: 16px; font-weight: bold; color: var(--primary); }
        
        .comm-section { background: #f1f5f9; padding: 10px; border-radius: 12px; margin-top: 10px; font-size: 12px; }
        .comm-list { max-height: 80px; overflow-y: auto; margin-bottom: 8px; }

        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 25px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <span>BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content">
        <div id="view-auth">
            <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
            <div style="text-align:center; margin-top:30px;">
                <img src="bololo.png" alt="Logo" style="width: 120px; margin-bottom: 20px;">
                <img src="qr.png" alt="QR" style="width: 140px; opacity: 0.8;">
            </div>
        </div>

        <div id="dash-params" class="hidden">
            <div style="background: white; padding: 15px; border-radius: 20px;">
                <input type="text" id="set-name" placeholder="Nom de la Boutique">
                <input type="file" accept="image/*" onchange="handleLogo(event)">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div style="background: white; padding: 15px; border-radius: 20px;">
                <input type="text" id="p-name" placeholder="Nom Article">
                <input type="number" id="p-price" placeholder="Prix (FCFA)">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" accept="image/*" onchange="handleProdImg(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list" style="margin-top:15px;"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="sticky-header">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Nom ou Numéro de boutique..." oninput="autoComplete(this.value)">
                    <div id="suggest-box" class="autocomplete-results hidden"></div>
                </div>
                <select onchange="changeTheme(this.value)" style="padding: 8px; font-size: 11px; height:35px;">
                    <option value="theme-glamour">✨ Glamour (Teal)</option>
                    <option value="theme-feminin">🌸 Féminin</option>
                    <option value="theme-masculin">👔 Masculin</option>
                    <option value="theme-dark">🌙 Sombre</option>
                </select>
                <div id="stories-list" class="stories-container"></div>
            </div>
            
            <div id="shop-header" style="padding-bottom:10px;"></div>
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>ARTICLES</div>
        <div class="nav-item" onclick="showSection('view', this); initView();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let viewedTel = "";
    let tempLogo = "";
    let tempProdImg = "";
    let userVotes = {}; 

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', (snap) => {
            const user = snap.val();
            if (!user || user.pass !== pass) return alert("Erreur identifiants");
            currentUser = user; viewedTel = tel;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            showSection('params', document.querySelector('.nav-item'));
            renderAdminList();
        });
    }

    function handleLogo(e) { const r = new FileReader(); r.onload = () => tempLogo = r.result; r.readAsDataURL(e.target.files[0]); }
    function handleProdImg(e) { const r = new FileReader(); r.onload = () => tempProdImg = r.result; r.readAsDataURL(e.target.files[0]); }

    function saveSettings() {
        db.ref('accounts/' + currentUser.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo }).then(() => alert("Réussi !"));
    }

    function addProduct() {
        const newItem = { id: Date.now(), name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, desc: document.getElementById('p-desc').value, img: tempProdImg, likes: 0, dislikes: 0, comments: [] };
        db.ref('accounts/' + currentUser.tel + '/catalog').once('value', s => {
            let cat = s.val() || []; cat.push(newItem);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => { tempProdImg = ""; alert("Publié !"); });
        });
    }

    function renderAdminList() {
        db.ref('accounts/' + currentUser.tel + '/catalog').on('value', snap => {
            const cat = snap.val() || [];
            document.getElementById('admin-list').innerHTML = cat.map(it => `<div style="background:white; padding:10px; margin-bottom:5px; border-radius:10px;"><b>${it.name}</b> - ${it.price} FCFA</div>`).join('');
        });
    }

    // --- RECHERCHE ET VUE ---
    function autoComplete(val) {
        const box = document.getElementById('suggest-box');
        if(val.length < 2) { box.classList.add('hidden'); return; }
        db.ref('accounts').once('value', snap => {
            const allUsers = snap.val();
            const filtered = Object.values(allUsers).filter(u => 
                (u.tel && u.tel.includes(val)) || 
                (u.shopName && u.shopName.toLowerCase().includes(val.toLowerCase()))
            );
            box.classList.toggle('hidden', filtered.length === 0);
            box.innerHTML = filtered.map(u => `
                <div class="suggestion-item" onclick="selectShop('${u.tel}')">
                    <img src="${u.shopLogo || 'bololo.png'}">
                    <div><b>${u.shopName || 'Boutique'}</b><br><small>${u.tel}</small></div>
                </div>`).join('');
        });
    }

    function initView() {
        db.ref('accounts').once('value', snap => {
            const users = snap.val();
            document.getElementById('stories-list').innerHTML = Object.values(users).map(u => `
                <div class="story-item" onclick="selectShop('${u.tel}')">
                    <img src="${u.shopLogo || 'bololo.png'}" class="story-circle">
                    <span class="story-name">${u.shopName || u.tel}</span>
                </div>
            `).join('');
        });
        if(currentUser) selectShop(currentUser.tel);
    }

    function selectShop(tel) { 
        viewedTel = tel; 
        document.getElementById('suggest-box').classList.add('hidden');
        document.getElementById('search-input').value = "";
        renderShop(); 
    }

    function renderShop() {
        const list = document.getElementById('shop-list');
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const u = snap.val();
            const catalog = u.catalog || [];
            const isOwner = (currentUser && currentUser.tel === viewedTel);
            document.getElementById('shop-header').innerHTML = `<div style="text-align:center; padding:5px;"><b>${u.shopName || 'Boutique'}</b></div>`;

            list.innerHTML = catalog.map((it, i) => {
                const voted = userVotes[it.id];
                return `
                <div class="product-card">
                    <img src="${it.img || ''}" class="product-img-display">
                    <div style="padding:15px;">
                        <b>${it.name}</b> | <span style="color:var(--primary)">${it.price} FCFA</span>
                        <div class="interactions">
                            <button class="btn-vote" ${voted ? 'disabled' : ''} onclick="vote(${i}, 'likes', ${it.id})">👍 ${it.likes || 0}</button>
                            <button class="btn-vote" ${voted ? 'disabled' : ''} onclick="vote(${i}, 'dislikes', ${it.id})">👎 ${it.dislikes || 0}</button>
                        </div>
                        <div class="comm-section">
                            <div class="comm-list">
                                ${(it.comments || []).map(c => `<div><b>${c.isOwner ? 'Boutique' : 'Client'}:</b> ${c.text}</div>`).join('')}
                            </div>
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <input type="text" id="in-comm-${i}" placeholder="Commenter..." style="margin:0; padding:8px; height:35px;">
                                <button onclick="sendComm(${i}, ${isOwner})" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 10px;">ENVOYER</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        });
    }

    function vote(idx, type, prodId) {
        if(userVotes[prodId]) return;
        userVotes[prodId] = true;
        db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/' + type).transaction(v => (v || 0) + 1);
    }

    function sendComm(idx, isOwner) {
        const input = document.getElementById('in-comm-'+idx);
        if(!input.value) return;
        db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/comments').once('value', s => {
            let comms = s.val() || [];
            comms.push({ text: input.value, isOwner: isOwner });
            db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/comments').set(comms);
            input.value = "";
        });
    }

    function changeTheme(v) { document.body.className = v; }
</script>
</body>
</html>
