<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BololoShop">
    <link rel="apple-touch-icon" href="bololo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body.theme-glamour { --primary: #a855f7; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #64748b; --glam: linear-gradient(135deg, #334155 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #e2e8f0; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: var(--text); 
            overscroll-behavior: none; 
        }

        .iphone-xs-screen { 
            width: 100%;
            max-width: 400px; 
            height: 100vh;     
            background: white; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            border: none;      
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }
        
        header { 
            background: var(--glam); 
            color: white; 
            padding: 60px 20px 20px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1.1rem; 
            position: relative; 
            z-index: 1000; 
        }

        .btn-logout { 
            position: absolute; 
            right: 15px; 
            bottom: 18px; 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 0.65rem; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); position: relative; }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }

        .sticky-area { position: sticky; top: -20px; background: var(--bg); z-index: 500; padding: 10px 0; margin-bottom: 15px; }
        .search-container { position: relative; margin-bottom: 15px; }
        .autocomplete-results { position: absolute; top: 45px; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 1100; max-height: 200px; overflow-y: auto; border: 1px solid #eee; }
        .suggestion-item { display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #000; }
        .suggestion-item img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; color: #1e293b; }
        .product-img-container { 
            width: 100%; 
            background: #f8fafc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
            min-height: 250px;
        }
        .product-img-display { 
            width: 100%; 
            height: auto; 
            max-height: 450px;
            object-fit: contain; 
            display: block;
        }
        
        .interactions { display: flex; gap: 15px; padding: 10px; border-top: 1px solid #eee; }
        .btn-vote { border: none; background: none; cursor: pointer; font-size: 14px; font-weight: bold; color: #000 !important; }
        .btn-vote:disabled { opacity: 0.4; cursor: default; }
        
        .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .badge-vendeur { background: var(--primary); color: white; }
        .badge-client { background: #e2e8f0; color: #475569; }

        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 25px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; margin: 10px auto; border: 1px solid #eee; }
        
        /* Style pour l'alignement des logos */
        .auth-logos { text-align: center; margin-top: 30px; }
        .auth-logos img { display: block; margin: 0 auto; }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <span id="title-text">BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content" id="main-content">
        <div id="view-auth">
            <div class="tab-bar" style="display:flex; gap:5px; margin-bottom:25px; border-bottom:1px solid #eee;">
                <span id="t-login" class="tab-item active" style="flex:1; text-align:center; padding:12px; cursor:pointer; font-weight:bold; font-size:0.7rem;" onclick="switchTab('login')">LOGIN</span>
                <span id="t-signup" class="tab-item" style="flex:1; text-align:center; padding:12px; cursor:pointer; font-weight:bold; font-size:0.7rem; color:#999;" onclick="switchTab('signup')">CREER</span>
            </div>
            
            <div id="area-login">
                <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
                
                <div class="auth-logos">
                    <img src="bololo.png" alt="Logo Bololo" style="width: 100px; margin-bottom: 15px;">
                    <img src="qr.png" alt="QR Code" style="width: 80px;">
                </div>
            </div>

            <div id="area-signup" class="hidden">
                <input type="tel" id="s-tel" placeholder="Votre numéro" oninput="drawQR('s-tel', 'qr-signup')">
                <center><div id="qr-signup" class="qr-box"></div></center>
                <input type="password" id="s-pass" placeholder="Mot de passe">
                <input type="password" id="s-confirm" placeholder="Confirmer">
                <button class="btn-action" onclick="doSignup()">CREER LE COMPTE</button>
            </div>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center;">
                <label style="font-size:0.7rem; font-weight:bold; color:var(--primary)">VOTRE QR</label><br>
                <div id="qr-admin" class="qr-box"></div>
            </div>
            <div class="card">
                <select id="theme-selector" onchange="changeTheme()">
                    <option value="theme-glamour">✨ Glamour</option>
                    <option value="theme-feminin">🌸 Féminin</option>
                    <option value="theme-masculin">👔 Masculin</option>
                    <option value="theme-dark">🌙 Sombre</option>
                </select>
                <input type="text" id="set-name" placeholder="Nom de la Boutique">
                <label style="font-size:0.7rem;">LOGO DE BOUTIQUE</label>
                <input type="file" accept="image/*" onchange="handleLogo(event)">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Nom Article">
                <input type="number" id="p-price" placeholder="Prix (FCFA)">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" id="p-img-input" accept="image/*" onchange="handleProdImg(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="sticky-area">
                <div class="search-container">
                    <input type="tel" id="search-tel" placeholder="Chercher une boutique..." oninput="autoComplete(this.value)">
                    <div id="suggest-box" class="autocomplete-results hidden"></div>
                </div>
                <div id="shop-header"></div>
            </div>
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>ARTICLES</div>
        <div class="nav-item" onclick="showSection('view', this); viewCurrentShop();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let viewedTel = "";
    let tempLogo = "";
    let tempProdImg = "";
    let userVotes = {}; 

    function switchTab(t) {
        document.getElementById('area-login').classList.toggle('hidden', t !== 'login');
        document.getElementById('area-signup').classList.toggle('hidden', t !== 'signup');
        document.getElementById('t-login').classList.toggle('active', t === 'login');
        document.getElementById('t-signup').classList.toggle('active', t === 'signup');
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function drawQR(inputId, containerId) {
        const val = document.getElementById(inputId).value;
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        if(val.length >= 4) new QRCode(container, { text: val, width: 120, height: 120 });
    }

    function doSignup() {
        const tel = document.getElementById('s-tel').value;
        const pass = document.getElementById('s-pass').value;
        if (tel.length < 4 || pass !== document.getElementById('s-confirm').value) return alert("Erreur saisie");
        db.ref('accounts/' + tel).set({ tel, pass, limit: 2, shopName: "", shopLogo: "", catalog: [], blocked: false }).then(() => { alert("Compte créé !"); switchTab('login'); });
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', (snap) => {
            const user = snap.val();
            if (!user || user.pass !== pass) return alert("Identifiants incorrects");
            if (user.blocked) return alert("❌ COMPTE BLOQUÉ.");
            currentUser = user; viewedTel = tel;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('set-name').value = user.shopName || "";
            tempLogo = user.shopLogo || "";
            showSection('params', document.querySelector('.nav-item'));
            new QRCode(document.getElementById('qr-admin'), { text: user.tel, width: 140, height: 140 });
            renderAdminList();
        });
    }

    function handleLogo(e) {
        const reader = new FileReader();
        reader.onload = () => tempLogo = reader.result;
        reader.readAsDataURL(e.target.files[0]);
    }

    function saveSettings() {
        db.ref('accounts/' + currentUser.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo }).then(() => alert("Sauvegardé !"));
    }

    function handleProdImg(event) {
        const reader = new FileReader();
        reader.onload = () => tempProdImg = reader.result;
        reader.readAsDataURL(event.target.files[0]);
    }

    function addProduct() {
        db.ref('accounts/' + currentUser.tel).once('value', snap => {
            const user = snap.val();
            const catalog = user.catalog || [];
            if (catalog.length >= (user.limit || 2)) return alert("Quota atteint");
            const newItem = { id: Date.now(), name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, desc: document.getElementById('p-desc').value, img: tempProdImg, likes: 0, dislikes: 0, comments: [] };
            catalog.push(newItem);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(catalog).then(() => { tempProdImg = ""; document.getElementById('p-img-input').value = ""; renderAdminList(); });
        });
    }

    function renderAdminList() {
        db.ref('accounts/' + currentUser.tel + '/catalog').on('value', snap => {
            const catalog = snap.val() || [];
            document.getElementById('admin-list').innerHTML = catalog.map((it, i) => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${it.img || ''}" style="width:40px;height:40px;border-radius:5px;object-fit:cover;">
                        <span><b>${it.name}</b></span>
                    </div>
                    <button onclick="deleteProduct(${i})" style="color:red; border:none; background:none; font-size:1.2rem;">🗑️</button>
                </div>`).join('');
        });
    }

    function deleteProduct(i) {
        if(confirm("Supprimer ?")) {
            db.ref('accounts/' + currentUser.tel + '/catalog').once('value', snap => {
                let cat = snap.val();
                cat.splice(i, 1);
                db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
            });
        }
    }

    function autoComplete(val) {
        const box = document.getElementById('suggest-box');
        if(val.length < 2) { box.classList.add('hidden'); return; }
        db.ref('accounts').once('value', snap => {
            const data = snap.val();
            const filtered = Object.values(data).filter(a => a.tel.includes(val) || (a.shopName && a.shopName.toLowerCase().includes(val.toLowerCase())));
            box.classList.toggle('hidden', filtered.length === 0);
            box.innerHTML = filtered.map(a => `
                <div class="suggestion-item" onclick="selectShop('${a.tel}')">
                    <img src="${a.shopLogo || 'bololo.png'}">
                    <div><b>${a.shopName || 'Boutique'}</b><br><small>${a.tel}</small></div>
                </div>`).join('');
        });
    }

    function selectShop(tel) { viewedTel = tel; document.getElementById('suggest-box').classList.add('hidden'); renderShop(); }
    function viewCurrentShop() { viewedTel = currentUser.tel; renderShop(); }

    function renderShop() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const u = snap.val();
            if(!u) return;
            const catalog = u.catalog || [];
            const isOwner = (currentUser && currentUser.tel === viewedTel);
            document.getElementById('shop-header').innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; background:white; padding:12px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                    <img src="${u.shopLogo || 'bololo.png'}" style="width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid var(--primary);">
                    <div style="text-align:left"><h4 style="margin:0">${u.shopName || 'Boutique'}</h4><small>${u.tel}</small></div>
                </div>`;
            document.getElementById('shop-list').innerHTML = catalog.map((it, i) => {
                const hasVoted = userVotes[it.id];
                return `
                <div class="product-card">
                    <div class="product-img-container">${it.img ? `<img src="${it.img}" class="product-img-display">` : 'Image'}</div>
                    <div style="padding:15px;">
                        <b>${it.name}</b><br><span style="color:var(--primary); font-weight:bold;">${it.price} FCFA</span>
                        <p style="font-size:0.75rem; color:#666; margin:5px 0;">${it.desc || ''}</p>
                        <div class="interactions">
                            <button class="btn-vote" ${ (isOwner || hasVoted) ? 'disabled' : '' } onclick="vote(${i}, 'likes', ${it.id})">👍 ${it.likes || 0}</button>
                            <button class="btn-vote" ${ (isOwner || hasVoted) ? 'disabled' : '' } onclick="vote(${i}, 'dislikes', ${it.id})">👎 ${it.dislikes || 0}</button>
                        </div>
                        <div style="background:#f8fafc; padding:10px; border-radius:10px; font-size:11px;">
                            <div id="comm-area-${i}">${(it.comments || []).map(c => `<div style="margin-bottom:4px; border-bottom:1px solid #eee;"><b>${c.text}</b> <span class="badge ${c.isOwner ? 'badge-vendeur' : 'badge-client'}">${c.isOwner ? 'Vendeur' : 'Client'}</span></div>`).join('')}</div>
                            <div style="display:flex; gap:5px; margin-top:5px;">
                                <input type="text" id="in-comm-${i}" placeholder="Commenter..." style="margin:0; padding:5px; font-size:11px;">
                                <button onclick="sendComm(${i}, ${isOwner})" style="border:none; background:var(--primary); color:white; border-radius:5px; padding:5px 10px; cursor:pointer;">📩</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        });
    }

    function vote(idx, type, prodId) { userVotes[prodId] = true; db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/' + type).transaction(v => (v || 0) + 1); }

    function sendComm(idx, isOwner) {
        const input = document.getElementById('in-comm-'+idx);
        if(!input.value) return;
        db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/comments').once('value', s => {
            let comms = s.val() || [];
            comms.push({ text: input.value, isOwner: isOwner });
            db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/comments').set(comms);
            input.value = "";
        });
    }

    function changeTheme() { document.body.className = document.getElementById('theme-selector').value; }
</script>
</body>
</html>
