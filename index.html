<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .iphone-xs-screen { width: 375px; height: 812px; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: 55px 20px 15px; text-align: center; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); position: relative; }
        
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }

        /* HEADER MARCHE STATIQUE */
        .market-header { position: sticky; top: -20px; background: var(--bg); z-index: 100; padding-bottom: 10px; }
        .search-res { background: white; border-radius: 12px; position: absolute; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 110; max-height: 200px; overflow-y: auto; border: 1px solid #ddd; margin-top: -5px; }
        .search-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.8rem; }

        /* IMAGES REDIMENSIONNÉES */
        .img-container { width: 100%; height: 250px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* ARTICLES PROPRES (ONGLET AJOUTER) */
        .my-item-row { display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border-radius: 15px; margin-bottom: 8px; border: 1px solid #eee; }
        .my-item-row img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }

        /* SOCIAL */
        .comm-bubble { background: #f1f5f9; padding: 8px; border-radius: 10px; font-size: 0.75rem; margin-top: 5px; }
        
        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .qr-box { background: white; padding: 10px; border-radius: 15px; display: inline-block; border: 1px solid #eee; margin: 10px 0; }
    </style>
</head>
<body>

<div class="iphone-xs-screen">
    <header id="app-header">BOLOLO Pro</header>
    
    <div class="content">
        <div id="view-login">
            <h2 style="text-align:center;">Connexion</h2>
            <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
            <p onclick="switchAuth('signup')" style="text-align:center; color:var(--primary); cursor:pointer; font-size:0.8rem; margin-top:15px;">Pas de compte ? Créer un compte</p>
        </div>

        <div id="view-signup" class="hidden">
            <h2 style="text-align:center;">Inscription</h2>
            <input type="tel" id="s-tel" placeholder="Votre numéro" oninput="generateQR(this.value)">
            <center><div id="qr-signup" class="qr-box"></div></center>
            <input type="password" id="s-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doSignup()">S'INSCRIRE</button>
            <p onclick="switchAuth('login')" style="text-align:center; color:var(--primary); cursor:pointer; font-size:0.8rem; margin-top:15px;">Retour</p>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center; background: var(--glam); color:white; padding: 20px;">
                <h1 id="user-balance">0 BLL</h1>
                <p>SOLDE PORTEFEUILLE</p>
            </div>
            <div class="card">
                <h3>Paramètres Boutique</h3>
                <label style="font-size:0.7rem">Logo de l'entreprise :</label>
                <input type="file" accept="image/*" onchange="handleFile(event, 'logo')">
                <input type="text" id="set-name" placeholder="Nom de l'entreprise">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
            <div class="card">
                <h3>Forfaits</h3>
                <button class="btn-action" style="background:#cd7f32" onclick="buyPlan('Bronze', 500, 20)">Bronze (20 articles)</button>
                <button class="btn-action" style="background:#c0c0c0" onclick="buyPlan('Argent', 1200, 50)">Argent (50 articles)</button>
                <button class="btn-action" style="background:#ffd700; color:black" onclick="buyPlan('Or', 3000, 100)">Or (100 articles)</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <h3>Ajouter un produit</h3>
                <input type="text" id="p-name" placeholder="Nom">
                <input type="number" id="p-price" placeholder="Prix">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" accept="image/*" onchange="handleFile(event, 'prod')">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <h4>Mes articles</h4>
            <div id="my-list-container"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="market-header">
                <input type="text" id="search-box" placeholder="Chercher une boutique..." oninput="autoSearch(this.value)">
                <div id="search-results" class="search-res hidden"></div>
                
                <div class="card" style="display:flex; align-items:center; gap:15px; margin-top:10px; padding:10px;">
                    <img id="m-logo" src="bololo.png" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                    <div>
                        <b id="m-name">Boutique Bololo</b><br>
                        <small id="m-tel" style="color:gray">---</small>
                    </div>
                </div>
            </div>
            <div id="market-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>AJOUTER</div>
        <div class="nav-item" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let tempLogo = "", tempProd = "";
    let viewedTel = "";

    // AUTH & SYNC
    function generateQR(val) {
        const c = document.getElementById('qr-signup'); c.innerHTML = "";
        if(val.length > 2) new QRCode(c, { text: val, width: 100, height: 100 });
    }

    function doSignup() {
        const tel = document.getElementById('s-tel').value;
        const pass = document.getElementById('s-pass').value;
        db.ref('accounts/' + tel).set({ tel, pass, balance: 100, limit: 5, shopName: "Ma Boutique", shopLogo: "", catalog: [] })
        .then(() => switchAuth('login'));
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value, pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', snap => {
            const u = snap.val();
            if(u && u.pass === pass) {
                currentUser = u; viewedTel = tel;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-signup').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                showSection('params', document.querySelectorAll('.nav-item')[0]);
                syncData();
            } else alert("Erreur");
        });
    }

    function syncData() {
        db.ref('accounts/' + currentUser.tel).on('value', snap => {
            currentUser = snap.val();
            document.getElementById('user-balance').innerText = currentUser.balance + " BLL";
            document.getElementById('set-name').value = currentUser.shopName;
            renderMyArticles();
        });
    }

    // PROFIL
    function saveSettings() {
        db.ref('accounts/' + currentUser.tel).update({
            shopName: document.getElementById('set-name').value,
            shopLogo: tempLogo || currentUser.shopLogo
        }).then(() => alert("Profil mis à jour"));
    }

    // ARTICLES & SUPPRESSION
    function addProduct() {
        const cat = currentUser.catalog || [];
        if(cat.length >= (currentUser.limit || 5)) return alert("Quota plein !");
        cat.push({ id: Date.now(), name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), desc: document.getElementById('p-desc').value, img: tempProd, likes: 0, comments: [] });
        db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
    }

    function renderMyArticles() {
        const cat = currentUser.catalog || []; let html = "";
        cat.forEach((it, i) => {
            html += `<div class="my-item-row"><img src="${it.img || 'bololo.png'}"><div style="flex:1"><b>${it.name}</b></div><button class="btn-del" onclick="deleteItem(${i})">Supprimer</button></div>`;
        });
        document.getElementById('my-list-container').innerHTML = html;
    }

    function deleteItem(i) {
        if(confirm("Supprimer ?")) {
            let cat = [...currentUser.catalog]; cat.splice(i, 1);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
        }
    }

    // MARCHE & AUTOCOMPLETION
    function autoSearch(val) {
        const res = document.getElementById('search-results');
        if(!val) return res.classList.add('hidden');
        db.ref('accounts').once('value', snap => {
            let all = snap.val(), html = "";
            for(let t in all) {
                if(all[t].shopName.toLowerCase().includes(val.toLowerCase())) {
                    html += `<div class="search-item" onclick="viewShop('${t}')"><b>${all[t].shopName}</b> (${t})</div>`;
                }
            }
            res.innerHTML = html; res.classList.remove('hidden');
        });
    }

    function viewShop(tel) {
        viewedTel = tel;
        document.getElementById('search-results').classList.add('hidden');
        renderMarket();
    }

    function renderMarket() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const shop = snap.val();
            document.getElementById('m-name').innerText = shop.shopName;
            document.getElementById('m-tel').innerText = "Propriétaire: " + viewedTel;
            document.getElementById('m-logo').src = shop.shopLogo || 'bololo.png';

            let html = "";
            (shop.catalog || []).forEach((it, i) => {
                html += `
                <div class="card" style="padding:0; overflow:hidden;">
                    <div class="img-container"><img src="${it.img || 'bololo.png'}" class="product-img"></div>
                    <div style="padding:15px;">
                        <div style="display:flex; justify-content:space-between;"><b>${it.name}</b><b>${it.price} BLL</b></div>
                        <p style="font-size:0.7rem; color:gray;">${it.desc || ''}</p>
                        <div style="display:flex; gap:15px; font-size:0.8rem; margin:10px 0;">
                            <span onclick="like(${i})" style="cursor:pointer;">👍 ${it.likes || 0}</span>
                            <span>💬 ${(it.comments || []).length}</span>
                        </div>
                        <div id="comms-${i}">${(it.comments || []).map(c => `<div class="comm-bubble"><b>${c.user}</b>: ${c.text}</div>`).join('')}</div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input type="text" id="in-${i}" placeholder="Commenter..." style="margin:0; padding:8px;">
                            <button onclick="addComm(${i})" style="background:var(--primary); color:white; border:none; border-radius:10px; padding:0 10px;">📩</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('market-list').innerHTML = html || "<center>Boutique vide</center>";
        });
    }

    // INTERACTIONS SOCIALES
    function like(i) {
        db.ref('accounts/'+viewedTel+'/catalog/'+i+'/likes').transaction(l => (l || 0) + 1);
    }

    function addComm(i) {
        const txt = document.getElementById('in-'+i).value; if(!txt) return;
        db.ref('accounts/'+viewedTel+'/catalog/'+i+'/comments').once('value', s => {
            let c = s.val() || []; c.push({ user: currentUser.shopName, text: txt });
            db.ref('accounts/'+viewedTel+'/catalog/'+i+'/comments').set(c);
        });
    }

    // UTILITAIRES
    function handleFile(e, type) {
        const r = new FileReader(); r.onload = () => { if(type==='logo') tempLogo=r.result; else tempProd=r.result; };
        r.readAsDataURL(e.target.files[0]);
    }

    function buyPlan(n, p, l) {
        if(currentUser.balance < p) return alert("Solde insuffisant");
        db.ref('accounts/'+currentUser.tel).update({ balance: currentUser.balance - p, limit: l });
    }

    function switchAuth(m) {
        document.getElementById('view-login').classList.toggle('hidden', m==='signup');
        document.getElementById('view-signup').classList.toggle('hidden', m==='login');
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
