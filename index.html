
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body.theme-glamour { --primary: #a855f7; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #64748b; --glam: linear-gradient(135deg, #334155 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); overscroll-behavior: none; }
        .iphone-xs-screen { width: 100%; max-width: 400px; height: 100vh; background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { background: var(--glam); color: white; padding: 50px 20px 15px; text-align: center; font-weight: bold; position: relative; z-index: 1000; }
        .btn-logout { position: absolute; right: 10px; bottom: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; }
        .lang-select { position: absolute; left: 10px; bottom: 15px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 8px; font-size: 0.65rem; padding: 4px; outline: none; }

        .content { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }

        /* Layout Article horizontal */
        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #eee; display: flex; flex-direction: column; }
        .product-main { display: flex; gap: 12px; padding: 12px; }
        .product-img-display { width: 110px; height: 110px; border-radius: 12px; object-fit: cover; background: #f8fafc; }
        .product-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .product-desc { font-size: 0.75rem; color: #64748b; margin-top: 5px; line-height: 1.3; }

        /* Commentaires */
        .comment-area { background: #f8fafc; border-top: 1px solid #eee; padding: 10px; }
        .comment-list { max-height: 70px; overflow-y: auto; font-size: 0.7rem; margin-bottom: 8px; }
        .comment-item { margin-bottom: 4px; padding: 4px 8px; background: white; border-radius: 8px; border: 1px solid #e2e8f0; }
        .comment-input-box { display: flex; gap: 5px; }
        .comment-input-box input { flex: 1; padding: 6px; font-size: 0.75rem; margin-bottom: 0; }
        
        /* Stories & Filtres */
        .story-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .story-item { flex: 0 0 auto; text-align: center; width: 65px; }
        .story-circle { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; }
        .story-name { font-size: 9px; font-weight: bold; display: block; margin-top: 4px; }

        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 25px; }
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-action { background: var(--glam); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; margin: 10px 0; border: 1px solid #eee; }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <select class="lang-select" onchange="changeLang(this.value)">
            <option value="fr">🇫🇷 FR</option>
            <option value="en">🇺🇸 EN</option>
        </select>
        <span id="title-text">BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content">
        <div id="view-auth">
            <div style="display:flex; justify-content:space-around; margin-bottom:20px; font-weight:bold; font-size:0.8rem;">
                <span id="t-login" onclick="switchTab('login')" style="cursor:pointer; color:var(--primary)">LOGIN</span>
                <span id="t-vitrine" onclick="openVitrineDirect()" style="cursor:pointer;">🛍️ VITRINE</span>
            </div>

            <div id="area-login" style="text-align:center">
                <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
                <p id="link-signup" onclick="switchTab('signup')" style="font-size:0.7rem; color:var(--primary); cursor:pointer; margin-top:15px;">CRÉER UN COMPTE</p>
            </div>

            <div id="area-signup" class="hidden" style="text-align:center">
                <div style="display:flex; gap:5px;">
                    <select id="s-prefix" style="width:100px;">
                        <option value="+226">🇧🇫 +226</option>
                        <option value="+225">🇨🇮 +225</option>
                        <option value="+221">🇸🇳 +221</option>
                        <option value="+212">🇲🇦 +212</option>
                        <option value="+33">🇫🇷 +33</option>
                    </select>
                    <input type="tel" id="s-tel" placeholder="Numéro" oninput="drawQR('s-tel', 'qr-signup')">
                </div>
                <center><div id="qr-signup" class="qr-box"></div></center>
                <input type="password" id="s-pass" placeholder="Mot de passe">
                <input type="password" id="s-confirm" placeholder="Confirmer">
                <button class="btn-action" onclick="doSignup()">S'INSCRIRE</button>
                <p onclick="switchTab('login')" style="font-size:0.7rem; cursor:pointer; margin-top:10px;">Retour</p>
            </div>
        </div>

        <div id="dash-params" class="hidden">
            <center><div id="qr-admin" class="qr-box"></div></center>
            <div class="card">
                <select id="theme-selector" onchange="changeTheme()">
                    <option value="theme-glamour">✨ Glamour</option>
                    <option value="theme-dark">🌙 Sombre</option>
                </select>
                <input type="text" id="set-name" placeholder="Nom de la Boutique">
                <select id="set-country">
                    <option value="">-- Choisir Pays --</option>
                    <option value="Burkina Faso">🇧🇫 Burkina Faso</option>
                    <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                    <option value="Sénégal">🇸🇳 Sénégal</option>
                    <option value="Maroc">🇲🇦 Maroc</option>
                    <option value="France">🇫🇷 France</option>
                </select>
                <input type="text" id="set-city" placeholder="Saisir votre Ville">
                <input type="file" onchange="handleLogo(event)">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Nom Article">
                <input type="number" id="p-price" placeholder="Prix (FCFA)">
                <textarea id="p-desc" placeholder="Description de l'article..."></textarea>
                <input type="file" onchange="handleProdImg(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div style="position:sticky; top:0; background:var(--bg); z-index:100; padding-bottom:10px;">
                <input type="text" id="search-input" placeholder="Chercher une boutique..." oninput="autoComplete(this.value)">
                <div id="suggest-box" class="hidden" style="background:white; border-radius:10px; padding:5px; border:1px solid #ddd;"></div>
                <div id="user-stories" class="story-container"></div>
                <div id="shop-header"></div>
            </div>
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" id="nav-params" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" id="nav-articles" onclick="showSection('articles', this)">📦<br>ARTICLES</div>
        <div class="nav-item" id="nav-view" onclick="showSection('view', this); viewCurrentShop();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null, viewedTel = "", tempLogo = "", tempProdImg = "";

    function changeLang(l) {
        document.getElementById('t-login').innerText = (l==='fr') ? "LOGIN" : "LOGIN";
        document.getElementById('title-text').innerText = "BOLOLO Pro";
    }

    function switchTab(t) {
        document.getElementById('area-login').classList.toggle('hidden', t !== 'login');
        document.getElementById('area-signup').classList.toggle('hidden', t !== 'signup');
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'view') renderStories();
    }

    // AUTH
    function doSignup() {
        const fullTel = document.getElementById('s-prefix').value + document.getElementById('s-tel').value;
        const pass = document.getElementById('s-pass').value;
        if(pass !== document.getElementById('s-confirm').value) return alert("Mots de passe différents");
        db.ref('accounts/'+fullTel).set({
            tel: fullTel, pass, shopName: "Ma Boutique", country:"", city:"", catalog: []
        }).then(() => { alert("Compte créé !"); switchTab('login'); });
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts').once('value', snap => {
            const users = snap.val();
            let found = Object.values(users || {}).find(u => u.tel.includes(tel) && u.pass === pass);
            if(!found) return alert("Identifiants incorrects");
            
            currentUser = found; viewedTel = found.tel;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            
            document.getElementById('set-name').value = found.shopName || "";
            document.getElementById('set-country').value = found.country || "";
            document.getElementById('set-city').value = found.city || "";
            
            showSection('params', document.getElementById('nav-params'));
            new QRCode(document.getElementById('qr-admin'), { text: found.tel, width: 120, height: 120 });
            renderAdminList();
        });
    }

    // CONFIG
    function saveSettings() {
        db.ref('accounts/'+currentUser.tel).update({
            shopName: document.getElementById('set-name').value,
            country: document.getElementById('set-country').value,
            city: document.getElementById('set-city').value,
            shopLogo: tempLogo || currentUser.shopLogo || ""
        }).then(() => alert("Réglages enregistrés"));
    }

    // ARTICLES
    function addProduct() {
        db.ref('accounts/'+currentUser.tel+'/catalog').once('value', s => {
            let cat = s.val() || [];
            cat.push({
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                desc: document.getElementById('p-desc').value,
                img: tempProdImg,
                likes: 0, dislikes: 0, comments: []
            });
            db.ref('accounts/'+currentUser.tel+'/catalog').set(cat).then(() => {
                alert("Article publié !"); renderAdminList();
            });
        });
    }

    // VITRINE
    function renderStories() {
        db.ref('accounts').once('value', snap => {
            const users = Object.values(snap.val() || {});
            document.getElementById('user-stories').innerHTML = users.map(u => `
                <div class="story-item" onclick="selectShop('${u.tel}')">
                    <img src="${u.shopLogo || 'bololo.png'}" class="story-circle">
                    <span class="story-name">${u.shopName}</span>
                </div>`).join('');
        });
    }

    function renderShop() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const u = snap.val(); if(!u) return;
            document.getElementById('shop-header').innerHTML = `<div class="card" style="text-align:center;"><b>${u.shopName}</b><br><small>📍 ${u.city}, ${u.country}</small></div>`;
            document.getElementById('shop-list').innerHTML = (u.catalog || []).map((it, i) => `
                <div class="product-card">
                    <div class="product-main">
                        <img src="${it.img || 'bololo.png'}" class="product-img-display">
                        <div class="product-info">
                            <b style="font-size:0.9rem;">${it.name}</b>
                            <span style="color:var(--primary); font-weight:bold;">${it.price} FCFA</span>
                            <div class="product-desc">${it.desc || ''}</div>
                        </div>
                    </div>
                    <div class="comment-area">
                        <div class="comment-list">
                            ${(it.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('')}
                        </div>
                        <div class="comment-input-box">
                            <input type="text" id="in-cmnt-${i}" placeholder="Commenter...">
                            <button onclick="sendComment(${i})" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 10px;">➤</button>
                        </div>
                    </div>
                </div>`).join('');
        });
    }

    function sendComment(idx) {
        const text = document.getElementById('in-cmnt-'+idx).value;
        if(!text) return;
        const user = currentUser ? currentUser.shopName : "Client";
        db.ref('accounts/'+viewedTel+'/catalog/'+idx+'/comments').once('value', s => {
            let cmnts = s.val() || [];
            cmnts.push({user, text});
            db.ref('accounts/'+viewedTel+'/catalog/'+idx+'/comments').set(cmnts);
            document.getElementById('in-cmnt-'+idx).value = "";
        });
    }

    // UTILS
    function selectShop(t) { viewedTel = t; renderShop(); }
    function viewCurrentShop() { if(currentUser) { viewedTel = currentUser.tel; renderShop(); } }
    function handleLogo(e) { const r = new FileReader(); r.onload = () => tempLogo = r.result; r.readAsDataURL(e.target.files[0]); }
    function handleProdImg(e) { const r = new FileReader(); r.onload = () => tempProdImg = r.result; r.readAsDataURL(e.target.files[0]); }
    function changeTheme() { document.body.className = document.getElementById('theme-selector').value; }
    function drawQR(id, cont) { 
        const v = document.getElementById(id).value; 
        const c = document.getElementById(cont); c.innerHTML = ""; 
        if(v.length > 3) new QRCode(c, {text:v, width:120, height:120}); 
    }
    function autoComplete(v) {
        const box = document.getElementById('suggest-box');
        if(v.length < 2) return box.classList.add('hidden');
        db.ref('accounts').once('value', snap => {
            const data = Object.values(snap.val() || {}).filter(u => u.shopName.toLowerCase().includes(v.toLowerCase()));
            box.classList.remove('hidden');
            box.innerHTML = data.map(u => `<div style="padding:8px;" onclick="selectShop('${u.tel}')">${u.shopName}</div>`).join('');
        });
    }
    function openVitrineDirect() { document.getElementById('view-auth').classList.add('hidden'); document.getElementById('dash-view').classList.remove('hidden'); renderStories(); }
    function renderAdminList() {
        db.ref('accounts/'+currentUser.tel+'/catalog').on('value', s => {
            document.getElementById('admin-list').innerHTML = (s.val()||[]).map((it, i) => `<div class="card" style="display:flex; justify-content:space-between;"><span>${it.name}</span><button onclick="deleteProduct(${i})" style="color:red; border:none; background:none;">🗑️</button></div>`).join('');
        });
    }
    function deleteProduct(i) { if(confirm("Supprimer ?")) { db.ref('accounts/'+currentUser.tel+'/catalog').once('value', s => { let cat = s.val(); cat.splice(i,1); db.ref('accounts/'+currentUser.tel+'/catalog').set(cat); }); } }
</script>
</body>
</html>
