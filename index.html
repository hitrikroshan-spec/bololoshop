<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .iphone-xs-screen { width: 375px; height: 812px; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: 55px 20px 15px; text-align: center; font-weight: bold; position: relative; }
        .btn-header-logout { position: absolute; right: 15px; bottom: 12px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.9rem; z-index: 110; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }

        /* MARCHÉ STICKY */
        .market-header { position: sticky; top: -20px; background: var(--bg); z-index: 90; padding-bottom: 10px; }
        .img-container { width: 100%; height: 230px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 15px 15px 0 0; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* INTERACTIONS */
        .interaction-bar { display: flex; gap: 20px; padding: 10px 0; border-top: 1px solid #eee; margin-top: 10px; font-weight: bold; }
        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .search-res { background: white; border-radius: 12px; position: absolute; width: 100%; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 100; max-height: 200px; overflow-y: auto; border: 1px solid #ddd; }
        .search-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<div class="iphone-xs-screen">
    <header>
        <span>BOLOLO Pro</span>
        <button id="logout-btn" class="btn-header-logout hidden" onclick="location.reload()">🚪 Quitter</button>
    </header>
    
    <div class="content">
        <div id="view-login">
            <h2 style="text-align:center;">Connexion</h2>
            <input type="tel" id="l-tel" placeholder="N° de téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">ACCÉDER À MON COMPTE</button>
            <p onclick="switchAuth('signup')" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:20px;">Pas encore de compte ? Créer</p>
        </div>

        <div id="view-signup" class="hidden">
            <h2 style="text-align:center;">Nouveau Compte</h2>
            <input type="tel" id="s-tel" placeholder="Votre numéro" oninput="generateQR(this.value)">
            <center><div id="qr-signup" style="background:white; padding:10px; border-radius:10px; margin-bottom:10px;"></div></center>
            <input type="password" id="s-pass" placeholder="Créer mot de passe">
            <button class="btn-action" onclick="doSignup()">S'INSCRIRE GRATUITEMENT</button>
            <p onclick="switchAuth('login')" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:20px;">Déjà inscrit ? Connexion</p>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center; background: var(--glam); color:white; padding: 20px;">
                <h1 id="user-balance">0 BLL</h1>
                <p>SOLDE PORTEFEUILLE</p>
            </div>
            <div class="card">
                <h3>Ma Boutique</h3>
                <input type="file" accept="image/*" onchange="handleFile(event, 'logo')">
                <input type="text" id="set-name" placeholder="Nom de l'entreprise">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
            <div class="card">
                <h3>Booster mon quota</h3>
                <button class="btn-action" style="background:#cd7f32" onclick="buyPlan('Bronze', 500, 20)">Bronze (20 art.) - 500 BLL</button>
                <button class="btn-action" style="background:#ffd700; color:black" onclick="buyPlan('Or', 3000, 100)">Or (100 art.) - 3000 BLL</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <h3>Nouveau Produit</h3>
                <input type="text" id="p-name" placeholder="Nom du produit">
                <input type="number" id="p-price" placeholder="Prix">
                <textarea id="p-desc" placeholder="Description courte"></textarea>
                <input type="file" accept="image/*" onchange="handleFile(event, 'prod')">
                <button class="btn-action" onclick="addProduct()">PUBLIER L'ARTICLE</button>
            </div>
            <h4>Mes articles</h4>
            <div id="my-list-articles"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="market-header">
                <input type="text" id="search-box" placeholder="Rechercher boutique..." oninput="autoSearch(this.value)">
                <div id="search-results" class="search-res hidden"></div>
                
                <div class="card" style="display:flex; align-items:center; gap:10px; margin-top:10px; padding:10px;">
                    <img id="m-logo" src="bololo.png" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                    <div style="flex:1"><b id="m-name">Boutique</b><br><small id="m-tel"></small></div>
                </div>
            </div>
            <div id="market-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-item" onclick="showSection('articles', this); renderMyArticles();">📦<br>STOCK</div>
        <div class="nav-item" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null, tempLogo = "", tempProd = "", viewedTel = "";

    function switchAuth(m) {
        document.getElementById('view-login').classList.toggle('hidden', m==='signup');
        document.getElementById('view-signup').classList.toggle('hidden', m==='login');
    }

    function generateQR(v) { 
        document.getElementById('qr-signup').innerHTML = ""; 
        if(v.length > 2) new QRCode(document.getElementById('qr-signup'), { text: v, width: 80, height: 80 }); 
    }

    function doSignup() {
        const tel = document.getElementById('s-tel').value, pass = document.getElementById('s-pass').value;
        if(!tel || !pass) return alert("Remplissez tout !");
        db.ref('accounts/' + tel).set({ tel, pass, balance: 1000, limit: 5, shopName: "Boutique "+tel, shopLogo: "", catalog: [] })
        .then(() => { alert("Compte créé avec succès !"); switchAuth('login'); });
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value, pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', snap => {
            const u = snap.val();
            if(u && u.pass === pass) {
                currentUser = u; viewedTel = tel;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                showSection('params', document.querySelectorAll('.nav-item')[0]);
                syncData();
            } else alert("Identifiants incorrects");
        });
    }

    function syncData() {
        db.ref('accounts/' + currentUser.tel).on('value', snap => {
            currentUser = snap.val();
            document.getElementById('user-balance').innerText = (currentUser.balance || 0) + " BLL";
        });
    }

    // --- LOGIQUE MARCHÉ ---
    function renderMarket() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const shop = snap.val();
            if(!shop) return;
            document.getElementById('m-name').innerText = shop.shopName;
            document.getElementById('m-tel').innerText = viewedTel;
            document.getElementById('m-logo').src = shop.shopLogo || 'bololo.png';
            
            let h = "";
            (shop.catalog || []).forEach((it, i) => {
                h += `
                <div class="card" style="padding:0; overflow:hidden; margin-bottom:20px;">
                    <div class="img-container"><img src="${it.img || 'bololo.png'}" class="product-img"></div>
                    <div style="padding:15px;">
                        <div style="display:flex; justify-content:space-between;"><b>${it.name}</b><b style="color:var(--primary)">${it.price} BLL</b></div>
                        <p style="font-size:0.75rem; color:gray; margin:10px 0;">${it.desc || ''}</p>
                        <div class="interaction-bar">
                            <span onclick="vote('${viewedTel}',${i},'likes')" style="cursor:pointer">👍 ${it.likes||0}</span>
                            <span onclick="vote('${viewedTel}',${i},'dislikes')" style="cursor:pointer">👎 ${it.dislikes||0}</span>
                        </div>
                        <button class="btn-action" style="background:#22c55e; margin-top:10px;" onclick="buyItem('${viewedTel}', ${it.price}, '${it.name}')">ACHETER MAINTENANT 🛒</button>
                    </div>
                </div>`;
            });
            document.getElementById('market-list').innerHTML = h || "<center style='padding:20px;'>Cette boutique n'a pas encore d'articles.</center>";
        });
    }

    function buyItem(seller, price, name) {
        if(seller === currentUser.tel) return alert("C'est votre propre article !");
        if(currentUser.balance < price) return alert("Solde insuffisant !");
        if(confirm(`Voulez-vous acheter ${name} pour ${price} BLL ?`)) {
            db.ref('accounts/' + currentUser.tel + '/balance').transaction(b => b - price);
            db.ref('accounts/' + seller + '/balance').transaction(b => (b || 0) + price);
            alert("Achat effectué ! Le vendeur a reçu le paiement.");
        }
    }

    function vote(seller, idx, type) {
        if(seller === currentUser.tel) return alert("Vous ne pouvez pas voter pour vos produits");
        db.ref('accounts/'+seller+'/catalog/'+idx+'/'+type).transaction(v => (v || 0) + 1);
    }

    // --- LOGIQUE STOCK ---
    function addProduct() {
        const cat = currentUser.catalog || [];
        if(cat.length >= (currentUser.limit || 5)) return alert("Quota plein ! Achetez un forfait.");
        cat.push({ name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), desc: document.getElementById('p-desc').value, img: tempProd, likes: 0, dislikes: 0 });
        db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => {
            alert("Article publié sur le marché !");
            document.getElementById('p-name').value = ""; document.getElementById('p-price').value = "";
            renderMyArticles();
        });
    }

    function renderMyArticles() {
        const cat = currentUser.catalog || [];
        document.getElementById('my-list-articles').innerHTML = cat.map((it, i) => `
            <div class="card" style="display:flex; align-items:center; gap:10px; padding:10px;">
                <img src="${it.img || 'bololo.png'}" style="width:40px; height:40px; border-radius:8px;">
                <div style="flex:1"><b>${it.name}</b></div>
                <button onclick="deleteItem(${i})" style="color:red; border:none; background:none; font-weight:bold;">Supprimer 🗑️</button>
            </div>
        `).join('');
    }

    function deleteItem(i) {
        if(confirm("Supprimer l'article ?")) {
            let cat = [...currentUser.catalog]; cat.splice(i, 1);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
        }
    }

    // --- FONCTIONS SYSTÈME ---
    function buyPlan(name, price, limit) {
        if(currentUser.balance < price) return alert("Solde insuffisant");
        db.ref('accounts/' + currentUser.tel).update({ balance: currentUser.balance - price, limit: limit }).then(()=>alert("Forfait activé !"));
    }

    function autoSearch(v) {
        const res = document.getElementById('search-results');
        if(!v) return res.classList.add('hidden');
        db.ref('accounts').once('value', s => {
            let all = s.val(), h = "";
            for(let t in all) if(all[t].shopName.toLowerCase().includes(v.toLowerCase())) h += `<div class="search-item" onclick="viewShop('${t}')"><b>${all[t].shopName}</b> (${t})</div>`;
            res.innerHTML = h; res.classList.remove('hidden');
        });
    }

    function viewShop(t) { viewedTel = t; document.getElementById('search-results').classList.add('hidden'); renderMarket(); }
    function handleFile(e, type) { const r = new FileReader(); r.onload = () => { if(type==='logo') tempLogo=r.result; else tempProd=r.result; }; r.readAsDataURL(e.target.files[0]); }
    function saveSettings() { db.ref('accounts/' + currentUser.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo || currentUser.shopLogo }).then(()=>alert("Profil mis à jour")); }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
