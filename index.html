<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="bololo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body.theme-glamour { --primary: #a855f7; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #64748b; --glam: linear-gradient(135deg, #334155 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .iphone-xs-screen { width: 375px; height: 812px; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: 55px 20px 15px; text-align: center; font-weight: bold; position: relative; z-index: 100; }
        .btn-logout { position: absolute; right: 15px; bottom: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); position: relative; }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; color: #1e293b; }

        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; }
        .product-img-container { width: 100%; height: 180px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img-display { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; border: 1px solid #eee; }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <span>BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content">
        <div id="view-auth">
            <div style="display:flex; border-bottom:1px solid #eee; margin-bottom:20px;">
                <div id="t-login" style="flex:1; text-align:center; padding:10px; font-weight:bold; cursor:pointer;" onclick="switchAuth('login')">CONNEXION</div>
                <div id="t-signup" style="flex:1; text-align:center; padding:10px; color:#999; cursor:pointer;" onclick="switchAuth('signup')">INSCRIPTION</div>
            </div>
            <div id="area-login">
                <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
            </div>
            <div id="area-signup" class="hidden">
                <input type="tel" id="s-tel" placeholder="Votre numéro" oninput="generateQR(this.value)">
                <center><div id="qr-signup" class="qr-box"></div></center>
                <input type="password" id="s-pass" placeholder="Mot de passe">
                <input type="password" id="s-confirm" placeholder="Confirmer">
                <button class="btn-action" onclick="doSignup()">CREER MON COMPTE</button>
            </div>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center; background: var(--glam); color:white;">
                <h1 id="user-balance" style="margin:0; font-size:2.2rem;">0 BLL</h1>
                <p style="margin:0; font-size:0.7rem;">SOLDE ACTUEL</p>
            </div>
            <div class="card">
                <h4 style="margin:0 0 10px 0;">ABONNEMENTS</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button onclick="buyPlan('Argent', 50, 2000)" style="font-size:10px; padding:10px; border-radius:10px; border:1px solid #ddd;"><b>ARGENT</b><br>2000 BLL</button>
                    <button onclick="buyPlan('Or', 100, 5000)" style="font-size:10px; padding:10px; border-radius:10px; border:1px solid #ffd700;"><b>OR</b><br>5000 BLL</button>
                </div>
            </div>
            <div class="card">
                <select id="theme-selector" onchange="changeTheme()">
                    <option value="theme-glamour">✨ Glamour</option>
                    <option value="theme-feminin">🌸 Féminin</option>
                    <option value="theme-masculin">👔 Masculin</option>
                    <option value="theme-dark">🌙 Sombre</option>
                </select>
                <input type="text" id="set-name" placeholder="Nom de la Boutique">
                <button class="btn-action" onclick="saveSettings()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Nom de l'article">
                <input type="number" id="p-price" placeholder="Prix en BLL">
                <input type="file" accept="image/*" onchange="handleProdImg(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER L'ARTICLE</button>
            </div>
            <div id="my-products-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div id="global-market"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>STOCK</div>
        <div class="nav-item" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let tempProdImg = "";

    function switchAuth(mode) {
        document.getElementById('area-login').classList.toggle('hidden', mode !== 'login');
        document.getElementById('area-signup').classList.toggle('hidden', mode !== 'signup');
    }

    function doSignup() {
        const tel = document.getElementById('s-tel').value;
        const pass = document.getElementById('s-pass').value;
        if (tel.length < 4 || pass !== document.getElementById('s-confirm').value) return alert("Erreur saisie");

        db.ref('accounts/' + tel).once('value', s => {
            if (s.exists()) return alert("Numéro déjà utilisé");
            db.ref('accounts/' + tel).set({
                tel, pass, balance: 0, limit: 10, plan: "Gratuit", catalog: [], blocked: false
            }).then(() => { alert("Compte créé !"); switchAuth('login'); });
        });
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', snap => {
            const u = snap.val();
            if (u && u.pass === pass) {
                if (u.blocked) return alert("Compte bloqué");
                currentUser = u;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                showSection('params', document.querySelector('.nav-item'));
                syncUser();
            } else alert("Échec connexion");
        });
    }

    function syncUser() {
        db.ref('accounts/' + currentUser.tel).on('value', snap => {
            currentUser = snap.val();
            document.getElementById('user-balance').innerText = (currentUser.balance || 0) + " BLL";
            renderMyProducts();
        });
    }

    function buyPlan(name, limit, price) {
        if (currentUser.balance < price) return alert("Solde insuffisant");
        db.ref('accounts/' + currentUser.tel).update({ balance: currentUser.balance - price, limit, plan: name });
    }

    function addProduct() {
        const catalog = currentUser.catalog || [];
        if (catalog.length >= (currentUser.limit || 10)) return alert("Quota atteint");
        const item = { id: Date.now(), name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), img: tempProdImg };
        catalog.push(item);
        db.ref('accounts/' + currentUser.tel + '/catalog').set(catalog).then(() => { tempProdImg = ""; });
    }

    function renderMyProducts() {
        const list = document.getElementById('my-products-list');
        list.innerHTML = (currentUser.catalog || []).map((it, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <img src="${it.img}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                <b>${it.name}</b>
                <button onclick="deleteProd(${i})" style="color:red; border:none; background:none;">🗑️</button>
            </div>
        `).join('');
    }

    function deleteProd(i) {
        let cat = currentUser.catalog; cat.splice(i,1);
        db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
    }

    function renderMarket() {
        db.ref('accounts').once('value', snap => {
            const all = snap.val();
            let html = "";
            for (let tel in all) {
                const shop = all[tel];
                (shop.catalog || []).forEach((it, i) => {
                    html += `
                    <div class="product-card">
                        <div class="product-img-container"><img src="${it.img}" class="product-img-display"></div>
                        <div style="padding:15px;">
                            <small>${shop.shopName || tel}</small><br>
                            <b>${it.name}</b><br>
                            <span style="font-weight:900;">${it.price} BLL</span>
                            <button class="btn-action" onclick="buyItem('${tel}', ${i}, ${it.price})" style="margin-top:10px;">ACHETER MAINTENANT</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('global-market').innerHTML = html || "<center>Boutique vide</center>";
        });
    }

    function buyItem(sellerTel, idx, price) {
        if (sellerTel === currentUser.tel) return alert("C'est votre article");
        if (currentUser.balance < price) return alert("Solde insuffisant");
        if (confirm("Payer " + price + " BLL ?")) {
            db.ref('accounts/' + currentUser.tel + '/balance').transaction(b => b - price);
            db.ref('accounts/' + sellerTel + '/balance').transaction(b => (b || 0) + price);
            alert("Achat effectué !");
        }
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function handleProdImg(e) { const r = new FileReader(); r.onload = () => tempProdImg = r.result; r.readAsDataURL(e.target.files[0]); }
    function generateQR(v) { document.getElementById('qr-signup').innerHTML = ""; if(v) new QRCode(document.getElementById('qr-signup'), {text:v, width:100, height:100}); }
    function changeTheme() { document.body.className = document.getElementById('theme-selector').value; }
    function saveSettings() { db.ref('accounts/' + currentUser.tel).update({ shopName: document.getElementById('set-name').value }); }
</script>
</body>
</html>
