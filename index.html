<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* RETOUR À LA COULEUR BLEU CANARD & BLANC */
        :root { 
            --primary: #008080; 
            --bg: #ffffff; 
            --text: #1a1a1a; 
            --glam: linear-gradient(135deg, #008080 0%, #ffffff 100%);
        }

        /* DÉFINITION DES THÈMES */
        body.theme-glamour { --primary: #008080; --glam: linear-gradient(135deg, #008080 0%, #ffffff 100%); --bg: #ffffff; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #008080; --glam: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f0f4f4; min-height: 100vh; display: flex; justify-content: center; color: var(--text); }

        .iphone-xs-screen { width: 100%; max-width: 400px; height: 100vh; background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.1); }
        
        header { background: var(--glam); color: white; padding: 60px 20px 20px; text-align: center; font-weight: bold; position: relative; z-index: 1000; }

        .btn-logout { position: absolute; right: 15px; bottom: 18px; background: rgba(255,255,255,0.3); border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; color: #1a1a1a; }

        /* STORIES (CERCLES) */
        .stories-container { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-item { flex: 0 0 70px; text-align: center; cursor: pointer; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; background: white; }
        .story-name { font-size: 10px; font-weight: bold; display: block; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; color: #1a1a1a; }
        .product-img-display { width: 100%; height: auto; max-height: 400px; object-fit: contain; background: #f9f9f9; }
        
        .interactions { display: flex; gap: 20px; padding: 10px; border-top: 1px solid #eee; }
        .btn-vote { border: none; background: none; cursor: pointer; font-size: 16px; font-weight: bold; color: var(--primary); transition: 0.2s; }
        .btn-vote:disabled { opacity: 0.5; color: #ccc; cursor: default; }

        .comm-section { background: #f8fafc; padding: 12px; border-radius: 12px; margin-top: 10px; font-size: 12px; }
        .comm-list { max-height: 100px; overflow-y: auto; margin-bottom: 8px; border-bottom: 1px solid #eee; }
        .comm-item { margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px dashed #ddd; }

        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 25px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 5px; }
        .badge-vendeur { background: var(--primary); }
        .badge-client { background: #94a3b8; }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <span id="title-text">BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content">
        <div id="view-auth">
            <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
            <p style="text-align:center; font-size:12px; margin-top:20px;">Pas de compte ? Contactez l'admin.</p>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card">
                <input type="text" id="set-name" placeholder="Nom de la Boutique">
                <input type="file" accept="image/*" onchange="handleLogo(event)">
                <button class="btn-action" onclick="saveSettings()">SAUVEGARDER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Nom de l'article">
                <input type="number" id="p-price" placeholder="Prix">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" accept="image/*" onchange="handleProdImg(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="card" style="padding:10px; margin-bottom:10px;">
                <select id="view-theme-selector" onchange="changeTheme(this.value)">
                    <option value="theme-glamour">✨ Thème Teal</option>
                    <option value="theme-feminin">🌸 Thème Rose</option>
                    <option value="theme-masculin">👔 Thème Bleu</option>
                    <option value="theme-dark">🌙 Thème Sombre</option>
                </select>
                <input type="text" placeholder="Rechercher boutique..." oninput="autoComplete(this.value)">
            </div>
            
            <div id="stories-list" class="stories-container"></div>
            <div id="shop-header"></div>
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>ARTICLES</div>
        <div class="nav-item" onclick="showSection('view', this); initView();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let viewedTel = "";
    let tempLogo = "";
    let tempProdImg = "";
    let userVotes = {}; // Local storage pour simuler le vote unique par session

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', (snap) => {
            const user = snap.val();
            if (!user || user.pass !== pass) return alert("Erreur !");
            currentUser = user; viewedTel = tel;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            showSection('params', document.querySelector('.nav-item'));
            renderAdminList();
        });
    }

    function handleLogo(e) { const r = new FileReader(); r.onload = () => tempLogo = r.result; r.readAsDataURL(e.target.files[0]); }
    function handleProdImg(e) { const r = new FileReader(); r.onload = () => tempProdImg = r.result; r.readAsDataURL(e.target.files[0]); }

    function saveSettings() {
        db.ref('accounts/' + currentUser.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo }).then(() => alert("Réglages enregistrés"));
    }

    function addProduct() {
        const newItem = { id: Date.now(), name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, desc: document.getElementById('p-desc').value, img: tempProdImg, likes: 0, dislikes: 0, comments: [] };
        db.ref('accounts/' + currentUser.tel + '/catalog').once('value', s => {
            let cat = s.val() || []; cat.push(newItem);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => { tempProdImg = ""; alert("Article ajouté !"); });
        });
    }

    function renderAdminList() {
        db.ref('accounts/' + currentUser.tel + '/catalog').on('value', snap => {
            const cat = snap.val() || [];
            document.getElementById('admin-list').innerHTML = cat.map((it, i) => `<div class="card"><b>${it.name}</b> - ${it.price} FCFA</div>`).join('');
        });
    }

    // --- VUE PUBLIQUE ---
    function initView() {
        db.ref('accounts').once('value', snap => {
            const users = snap.val();
            document.getElementById('stories-list').innerHTML = Object.values(users).map(u => `
                <div class="story-item" onclick="selectShop('${u.tel}')">
                    <img src="${u.shopLogo || 'bololo.png'}" class="story-circle">
                    <span class="story-name">${u.shopName || u.tel}</span>
                </div>
            `).join('');
        });
    }

    function selectShop(tel) { viewedTel = tel; renderShop(); }

    function renderShop() {
        const list = document.getElementById('shop-list');
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const u = snap.val();
            const catalog = u.catalog || [];
            const isOwner = (currentUser && currentUser.tel === viewedTel);

            document.getElementById('shop-header').innerHTML = `<h3 style="text-align:center">${u.shopName || 'Boutique'}</h3>`;

            list.innerHTML = catalog.map((it, i) => {
                const alreadyVoted = userVotes[it.id]; // On vérifie si l'utilisateur a déjà voté pour cet ID
                return `
                <div class="product-card">
                    <img src="${it.img || ''}" class="product-img-display">
                    <div style="padding:15px;">
                        <b>${it.name}</b> | <span style="color:var(--primary)">${it.price} FCFA</span>
                        <div class="interactions">
                            <button class="btn-vote" ${alreadyVoted ? 'disabled' : ''} onclick="vote(${i}, 'likes', ${it.id})">👍 ${it.likes || 0}</button>
                            <button class="btn-vote" ${alreadyVoted ? 'disabled' : ''} onclick="vote(${i}, 'dislikes', ${it.id})">👎 ${it.dislikes || 0}</button>
                        </div>
                        <div class="comm-section">
                            <div class="comm-list">
                                ${(it.comments || []).map(c => `<div class="comm-item"><b>${c.isOwner ? 'Vendeur' : 'Client'}:</b> ${c.text}</div>`).join('')}
                            </div>
                            <div style="display:flex; gap:5px;">
                                <input type="text" id="in-comm-${i}" placeholder="Ajouter un commentaire..." style="margin:0; padding:8px;">
                                <button onclick="sendComm(${i}, ${isOwner})" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 10px;">OK</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        });
    }

    // LOGIQUE DE VOTE UNIQUE
    function vote(idx, type, prodId) {
        if (userVotes[prodId]) return; // Sécurité supplémentaire
        userVotes[prodId] = true; // Marquer comme voté (un seul vote : soit like, soit dislike)
        db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/' + type).transaction(v => (v || 0) + 1);
    }

    function sendComm(idx, isOwner) {
        const input = document.getElementById('in-comm-'+idx);
        if(!input.value) return;
        db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/comments').once('value', s => {
            let comms = s.val() || [];
            comms.push({ text: input.value, isOwner: isOwner });
            db.ref('accounts/' + viewedTel + '/catalog/' + idx + '/comments').set(comms);
            input.value = "";
        });
    }

    function changeTheme(v) { document.body.className = v; }
</script>
</body>
</html>
