<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Ultra Business</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #4f46e5; --bg: #f3f4f6; 
            --male-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --female-gradient: linear-gradient(135deg, #831843 0%, #db2777 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

        .app-shell {
            width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
        }

        header { background: var(--male-gradient); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.5s; z-index: 10; }
        header.theme-female { background: var(--female-gradient); }

        .main-content { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* LOGO FIXE DANS LE MARCHÉ */
        .market-header { position: sticky; top: 0; background: var(--bg); z-index: 5; padding-bottom: 10px; text-align: center; }
        .market-logo { width: 70px; margin-bottom: 5px; }

        /* PANIER / COMMANDES */
        .order-card { display: flex; gap: 12px; padding: 12px; background: white; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; }
        .order-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .order-info { flex: 1; font-size: 0.8rem; }
        .status-badge { padding: 3px 7px; border-radius: 5px; font-size: 0.65rem; font-weight: bold; }
        .pending { background: #fef3c7; color: #92400e; }
        .delivered { background: #dcfce7; color: #166534; }

        /* FORFAITS */
        .plans-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .plan-box { border: 2px solid #e5e7eb; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; font-size: 0.65rem; }
        .plan-box.active { border-color: var(--primary); background: #f5f3ff; }

        /* PRODUITS */
        .product-item { background: white; border-radius: 24px; overflow: hidden; margin-bottom: 25px; border: 1px solid #e5e7eb; }
        .img-wrap { width: 100%; height: 250px; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .badge-price { position: absolute; top: 15px; right: 15px; background: var(--primary); color: white; padding: 8px 15px; border-radius: 50px; font-weight: 800; }

        .vote-bar { display: flex; gap: 20px; padding: 10px 0; border-top: 1px solid #eee; margin-top: 10px; }
        .vote-btn { cursor: pointer; font-weight: bold; font-size: 0.9rem; color: #64748b; }

        .btn-prime { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-buy { background: #10b981; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 10px; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 5px; border-radius: 6px; width: 100%; font-size: 0.7rem; margin-top: 5px; }

        nav { background: white; display: flex; padding: 10px 0; border-top: 1px solid #e5e7eb; }
        .nav-tab { flex: 1; text-align: center; color: #9ca3af; font-size: 0.6rem; font-weight: bold; cursor: pointer; }
        .nav-tab.active { color: var(--primary); }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #e5e7eb; border-radius: 12px; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-shell">
    <header id="app-header">
        <h2>BOLOLO <span style="font-weight: 200;">PRO</span></h2>
        <button onclick="location.reload()" id="btn-out" class="hidden" style="background:none; border:none; color:white; font-size:1.5rem;">🚪</button>
    </header>

    <div class="main-content">
        <div id="view-login" class="card" style="text-align:center;">
            <h2>Espace Business</h2>
            <input type="tel" id="l-tel" placeholder="N° Téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-prime" onclick="doLogin()">ACCÉDER</button>
            <p onclick="switchAuth('signup')" style="color:var(--primary); cursor:pointer; font-weight:bold; margin-top:15px;">Créer une boutique</p>
        </div>

        <div id="view-signup" class="card hidden">
            <input type="tel" id="s-tel" placeholder="N° Téléphone" oninput="genQR(this.value)">
            <center><div id="qr-area"></div></center>
            <input type="password" id="s-pass" placeholder="Mot de passe">
            <button class="btn-prime" onclick="doSignup()">S'INSCRIRE</button>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="background:var(--primary); color:white; text-align:center;">
                <small>CAPITAL</small><h1 id="user-balance" style="margin:5px 0;">0 BLL</h1>
            </div>
            <div class="card">
                <h3>Forfaits</h3>
                <div class="plans-grid">
                    <div class="plan-box" id="p-basic" onclick="buyPlan('Basic', 5000)">BASIC<br>5k</div>
                    <div class="plan-box" id="p-pro" onclick="buyPlan('Pro', 15000)">PRO<br>15k</div>
                    <div class="plan-box" id="p-ultra" onclick="buyPlan('Ultra', 50000)">ULTRA<br>50k</div>
                </div>
                <p><small>Statut: <b id="current-plan-tag">Gratuit</b></small></p>
            </div>
            <div class="card">
                <input type="text" id="set-name" placeholder="Nom Boutique">
                <select id="set-theme" onchange="updateThemeStyle(this.value)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px;">
                    <option value="male">Thème Homme</option>
                    <option value="female">Thème Femme</option>
                </select>
                <input type="file" accept="image/*" onchange="handleFile(event, 'logo')">
                <button class="btn-prime" onclick="saveProfile()">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Article">
                <input type="number" id="p-price" placeholder="Prix BLL">
                <input type="file" onchange="handleFile(event, 'prod')">
                <button class="btn-prime" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="my-stock-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="market-header">
                <img src="bololo.png" class="market-logo" onerror="this.src='https://via.placeholder.com/70'">
                <input type="text" id="search" placeholder="🔍 Rechercher boutique..." oninput="searchShop(this.value)">
                <div id="search-res" class="hidden" style="background:white; border:1px solid #ddd; position:absolute; width:100%; z-index:100;"></div>
            </div>
            <div class="card" style="display:flex; align-items:center; gap:10px;">
                <img id="v-logo" src="bololo.png" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <b id="v-name">...</b>
            </div>
            <div id="market-list"></div>
        </div>

        <div id="dash-cart" class="hidden">
            <h3>🛒 Mes Achats</h3>
            <div id="cart-list"></div>
        </div>
    </div>

    <nav id="navbar" class="hidden">
        <div class="nav-tab active" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-tab" onclick="showSection('articles', this); renderMyStock();">📦<br>STOCK</div>
        <div class="nav-tab" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
        <div class="nav-tab" onclick="showSection('cart', this); renderCart();">🛍️<br>PANIER</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, tempLogo = "", tempProd = "", viewedTel = "";

    function switchAuth(m) {
        document.getElementById('view-login').classList.toggle('hidden', m==='signup');
        document.getElementById('view-signup').classList.toggle('hidden', m==='login');
    }

    function genQR(v) {
        document.getElementById('qr-area').innerHTML = "";
        if(v.length > 2) new QRCode(document.getElementById('qr-area'), { text: v, width: 70, height: 70 });
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value, pass = document.getElementById('l-pass').value;
        db.ref('accounts/'+tel).once('value', s => {
            const d = s.val();
            if(d && d.pass === pass) {
                user = d; viewedTel = tel;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('btn-out').classList.remove('hidden');
                updateThemeStyle(user.theme || 'male');
                showSection('params', document.querySelectorAll('.nav-tab')[0]);
                db.ref('accounts/'+user.tel).on('value', snap => { 
                    user = snap.val(); 
                    document.getElementById('user-balance').innerText = user.balance + " BLL";
                    document.getElementById('current-plan-tag').innerText = user.plan || 'Gratuit';
                });
            } else alert("Erreur");
        });
    }

    function buyPlan(name, price) {
        if(user.balance < price) return alert("Solde insuffisant");
        db.ref('accounts/'+user.tel).update({ balance: user.balance - price, plan: name });
        alert("Forfait " + name + " activé !");
    }

    function vote(seller, idx, type) {
        if(seller === user.tel) return alert("Vote impossible sur vos produits");
        const other = type === 'likes' ? 'dislikes' : 'likes';
        db.ref('accounts/'+seller+'/catalog/'+idx).transaction(p => {
            if(p) {
                p[type] = (p[type] || 0) + 1;
                if(p[other] > 0) p[other] -= 1; // On ne peut pas faire les deux
            }
            return p;
        });
    }

    function buyItem(sellerTel, price, name, img, sellerName) {
        if(user.balance < price) return alert("Solde insuffisant");
        if(confirm("Acheter "+name+" ?")) {
            const date = new Date().toLocaleString();
            const order = { name, price, img, sellerTel, sellerName, date, status: "En attente" };
            db.ref('accounts/'+user.tel+'/balance').transaction(b => b - price);
            db.ref('accounts/'+sellerTel+'/balance').transaction(b => (b || 0) + price);
            let myOrders = user.orders || [];
            myOrders.push(order);
            db.ref('accounts/'+user.tel+'/orders').set(myOrders);
            alert("Achat effectué !");
        }
    }

    function renderCart() {
        const ords = (user.orders || []).reverse();
        document.getElementById('cart-list').innerHTML = ords.map((o, i) => `
            <div class="order-card">
                <img src="${o.img || 'bololo.png'}" class="order-img">
                <div class="order-info">
                    <b>${o.name}</b> - ${o.price} BLL<br>
                    <small>Vendeur: ${o.sellerName} (${o.sellerTel})</small><br>
                    <small>${o.date}</small><br>
                    <span class="status-badge ${o.status==='Livré'?'delivered':'pending'}">${o.status}</span>
                    ${o.status === 'En attente' ? `<button class="btn-confirm" onclick="confirmDeliv(${user.orders.length - 1 - i})">Confirmer Livraison</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function confirmDeliv(i) {
        let os = [...user.orders]; os[i].status = "Livré";
        db.ref('accounts/'+user.tel+'/orders').set(os);
    }

    function renderMarket() {
        db.ref('accounts/'+viewedTel).on('value', s => {
            const shop = s.val();
            document.getElementById('v-name').innerText = shop.shopName;
            document.getElementById('v-logo').src = shop.shopLogo || 'bololo.png';
            let h = "";
            (shop.catalog || []).forEach((it, i) => {
                h += `<div class="product-item">
                    <div class="img-wrap"><img src="${it.img || 'bololo.png'}" class="product-img"><span class="badge-price">${it.price} BLL</span></div>
                    <div style="padding:15px;">
                        <b>${it.name}</b>
                        <div class="vote-bar">
                            <span class="vote-btn" onclick="vote('${viewedTel}', ${i}, 'likes')">👍 ${it.likes||0}</span>
                            <span class="vote-btn" onclick="vote('${viewedTel}', ${i}, 'dislikes')">👎 ${it.dislikes||0}</span>
                        </div>
                        <button class="btn-buy" onclick="buyItem('${viewedTel}', ${it.price}, '${it.name}', '${it.img||''}', '${shop.shopName}')">ACHETER</button>
                    </div>
                </div>`;
            });
            document.getElementById('market-list').innerHTML = h || "<p style='text-align:center'>Aucun produit</p>";
        });
    }

    function renderMyStock() {
        const cat = user.catalog || [];
        document.getElementById('my-stock-list').innerHTML = cat.map((it, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${it.img}" style="width:40px; height:40px; border-radius:8px; object-fit:cover;">
                    <b>${it.name}</b>
                </div>
                <button onclick="delItem(${i})" style="color:red; background:none; border:none; font-size:1.2rem;">🗑️</button>
            </div>
        `).join('');
    }

    function delItem(i) {
        if(confirm("Supprimer l'article ?")) {
            let c = [...user.catalog]; c.splice(i,1);
            db.ref('accounts/'+user.tel+'/catalog').set(c);
        }
    }

    function addProduct() {
        let cat = user.catalog || [];
        cat.push({ name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), img: tempProd, likes:0, dislikes:0 });
        db.ref('accounts/'+user.tel+'/catalog').set(cat).then(() => alert("Produit ajouté !"));
    }

    function searchShop(v) {
        const res = document.getElementById('search-res');
        if(!v) return res.classList.add('hidden');
        db.ref('accounts').once('value', s => {
            let all = s.val(), h = "";
            for(let t in all) if(all[t].shopName.toLowerCase().includes(v.toLowerCase())) h += `<div onclick="goShop('${t}')" style="padding:10px; border-bottom:1px solid #eee;">${all[t].shopName}</div>`;
            res.innerHTML = h; res.classList.remove('hidden');
        });
    }

    function goShop(t) { viewedTel = t; document.getElementById('search-res').classList.add('hidden'); renderMarket(); }
    function handleFile(e, type) { const r = new FileReader(); r.onload = () => { if(type==='logo') tempLogo=r.result; else tempProd=r.result; }; r.readAsDataURL(e.target.files[0]); }
    function saveProfile() { db.ref('accounts/'+user.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo || user.shopLogo || "", theme: document.getElementById('set-theme').value }); alert("Profil mis à jour !"); }
    function updateThemeStyle(t) { document.getElementById('app-header').className = (t === 'female') ? 'theme-female' : ''; document.documentElement.style.setProperty('--primary', t === 'female' ? '#db2777' : '#4f46e5'); }

    function showSection(id, el) {
        ['params', 'articles', 'view', 'cart'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function doSignup() {
        const tel = document.getElementById('s-tel').value;
        db.ref('accounts/'+tel).set({ tel, pass: document.getElementById('s-pass').value, balance: 2000, theme: 'male', shopName: "Shop "+tel, catalog: [], plan: 'Gratuit', orders: [] })
        .then(() => switchAuth('login'));
    }
</script>
</body>
</html>
