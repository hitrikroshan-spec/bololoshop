<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="bololo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body.theme-glamour { --primary: #a855f7; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #64748b; --glam: linear-gradient(135deg, #334155 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); overscroll-behavior: none; }
        
        .iphone-xs-screen { width: 100vw; height: 100vh; background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: env(safe-area-inset-top, 45px) 20px 15px; text-align: center; font-weight: bold; font-size: 1rem; position: relative; z-index: 1000; }
        .btn-logout { position: absolute; right: 15px; bottom: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.6rem; }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg); position: relative; }
        
        /* FIXATION DE LA RECHERCHE ET DU HEADER DE BOUTIQUE */
        .sticky-top-area {
            position: sticky;
            top: -15px; /* Aligné avec le padding du parent */
            z-index: 900;
            background: var(--bg);
            padding-bottom: 10px;
        }

        .search-container { position: relative; margin-bottom: 10px; padding-top: 10px; }
        .autocomplete-results { position: absolute; top: 55px; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 1100; max-height: 200px; overflow-y: auto; }

        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }

        /* AJUSTEMENT DES IMAGES PRODUITS */
        .product-card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; }
        .product-img-container { width: 100%; height: 250px; background: #f8fafc; overflow: hidden; }
        .product-img-display { width: 100%; height: 100%; object-fit: cover; } /* L'image remplit tout le cadre proprement */
        
        .interactions { display: flex; gap: 15px; padding: 10px; border-top: 1px solid #eee; }
        .btn-vote { border: none; background: none; font-size: 14px; font-weight: bold; color: #000; }
        
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 calc(env(safe-area-inset-bottom, 10px) + 10px); } 
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-glamour">

<div class="iphone-xs-screen">
    <header>
        <span>BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content">
        <div id="view-auth">
            <div class="card" id="area-login">
                <input type="tel" id="l-tel" placeholder="Téléphone">
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button style="width:100%;" class="card" onclick="doLogin()">SE CONNECTER</button>
                <center><img src="bololo.png" style="width:100px; margin-top:20px;"></center>
            </div>
            <center><button onclick="switchTab('signup')" style="background:none; border:none; color:white;">Créer un compte</button></center>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center;">
                <div id="qr-admin"></div>
            </div>
            <div class="card">
                <input type="text" id="set-name" placeholder="Nom Boutique">
                <input type="file" accept="image/*" onchange="handleLogo(event)">
                <button onclick="saveSettings()">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Article">
                <input type="number" id="p-price" placeholder="Prix">
                <input type="file" onchange="handleProdImg(event)">
                <button onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="sticky-top-area">
                <div class="search-container">
                    <input type="tel" id="search-tel" placeholder="🔍 Chercher une boutique..." oninput="autoComplete(this.value)">
                    <div id="suggest-box" class="autocomplete-results hidden"></div>
                </div>
                <div id="shop-header"></div>
            </div>
            
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>STOCK</div>
        <div class="nav-item" onclick="showSection('view', this); viewCurrentShop();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let viewedTel = "";
    let tempLogo = "";
    let tempProdImg = "";

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', (snap) => {
            const user = snap.val();
            if (!user || user.pass !== pass) return alert("Erreur");
            currentUser = user; viewedTel = tel;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            showSection('params', document.querySelector('.nav-item'));
            renderAdminList();
        });
    }

    function addProduct() {
        db.ref('accounts/' + currentUser.tel + '/catalog').once('value', snap => {
            let cat = snap.val() || [];
            cat.push({ id: Date.now(), name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, img: tempProdImg, likes: 0 });
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => {
                alert("Publié !"); renderAdminList();
            });
        });
    }

    function renderShop() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const u = snap.val();
            const catalog = u.catalog || [];
            
            // Header Boutique Fixe
            document.getElementById('shop-header').innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; background:white; padding:12px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
                    <img src="${u.shopLogo || 'bololo.png'}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
                    <div><h4 style="margin:0">${u.shopName || 'Boutique'}</h4><small>${u.tel}</small></div>
                </div>`;

            // Liste de produits ajustée
            document.getElementById('shop-list').innerHTML = catalog.map((it) => `
                <div class="product-card">
                    <div class="product-img-container">
                        <img src="${it.img || ''}" class="product-img-display">
                    </div>
                    <div style="padding:15px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b style="font-size:1.1rem;">${it.name}</b>
                            <span style="color:var(--primary); font-weight:800;">${it.price} F</span>
                        </div>
                    </div>
                </div>`).join('');
        });
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function handleLogo(e) { const reader = new FileReader(); reader.onload = () => tempLogo = reader.result; reader.readAsDataURL(e.target.files[0]); }
    function handleProdImg(e) { const reader = new FileReader(); reader.onload = () => tempProdImg = reader.result; reader.readAsDataURL(e.target.files[0]); }
    function viewCurrentShop() { viewedTel = currentUser.tel; renderShop(); }
</script>
</body>
</html>
