<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .iphone-xs-screen { width: 375px; height: 812px; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: 55px 20px 15px; text-align: center; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
        
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
        
        /* STYLE POUR LES ARTICLES DANS LA SECTION AJOUTER */
        .my-item-card { display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #ddd; }
        .my-item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }

        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .plan-box { border: 2px solid #eee; padding: 10px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; }
        .plan-box.active { border-color: var(--primary); background: #f5f3ff; }
    </style>
</head>
<body>

<div class="iphone-xs-screen">
    <header>BOLOLO Pro</header>
    
    <div class="content">
        <div id="view-auth">
            <h2 style="text-align:center;">Connexion</h2>
            <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center; background: var(--glam); color:white; padding: 25px; border-radius:25px;">
                <h1 id="user-balance" style="margin:0; font-size: 2.5rem;">0 BLL</h1>
                <p style="margin:0; font-size:0.8rem; opacity: 0.9;">SOLDE PORTEFEUILLE</p>
            </div>
            
            <div class="card">
                <h3>Forfaits de Publication</h3>
                <div class="plan-box" onclick="buyPlan('Bronze', 500, 20)"><b>BRONZE (500 BLL)</b><br><small>Quota: 20 articles</small></div>
                <div class="plan-box" onclick="buyPlan('Argent', 1200, 50)"><b>ARGENT (1200 BLL)</b><br><small>Quota: 50 articles</small></div>
                <div class="plan-box" onclick="buyPlan('Or', 3000, 100)"><b>OR (3000 BLL)</b><br><small>Quota: 100 articles</small></div>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <h3>Publier un article</h3>
                <input type="text" id="p-name" placeholder="Nom de l'article">
                <input type="number" id="p-price" placeholder="Prix (BLL)">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" accept="image/*" onchange="handleFile(event, 'prod')">
                <button class="btn-action" onclick="addProduct()">PUBLIER DANS LE MARCHÉ</button>
            </div>

            <h3 style="margin-top:20px;">Mes articles en ligne</h3>
            <div id="my-articles-list">
                </div>
        </div>

        <div id="dash-view" class="hidden">
            <div id="market-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-item" onclick="showSection('articles', this); renderMyArticles();">📦<br>AJOUTER</div>
        <div class="nav-item" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let tempProdImg = "";

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', snap => {
            const u = snap.val();
            if(u && u.pass === pass) {
                currentUser = u;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                showSection('params', document.querySelector('.nav-item'));
                syncData();
            } else alert("Erreur");
        });
    }

    function syncData() {
        db.ref('accounts/' + currentUser.tel).on('value', snap => {
            currentUser = snap.val();
            document.getElementById('user-balance').innerText = (currentUser.balance || 0) + " BLL";
            if(document.getElementById('dash-articles').classList.contains('hidden') === false) {
                renderMyArticles();
            }
        });
    }

    // --- FONCTION POUR AFFICHER VOS ARTICLES AVEC BOUTON SUPPRIMER ---
    function renderMyArticles() {
        const cat = currentUser.catalog || [];
        let html = "";
        cat.forEach((it, i) => {
            html += `
            <div class="my-item-card">
                <img src="${it.img || 'bololo.png'}" class="my-item-img">
                <div style="flex:1">
                    <b>${it.name}</b><br>
                    <small>${it.price} BLL</small>
                </div>
                <button class="btn-del" onclick="deleteMyItem(${i})">Supprimer</button>
            </div>`;
        });
        document.getElementById('my-articles-list').innerHTML = html || "<p style='text-align:center; color:gray;'>Aucun article publié.</p>";
    }

    // --- FONCTION SUPPRIMER ---
    function deleteMyItem(index) {
        if(confirm("Voulez-vous vraiment retirer cet article du marché ?")) {
            let newCat = [...currentUser.catalog];
            newCat.splice(index, 1);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(newCat)
                .then(() => alert("Article supprimé"));
        }
    }

    function addProduct() {
        const cat = currentUser.catalog || [];
        if(cat.length >= (currentUser.limit || 5)) return alert("Quota atteint !");
        
        const newItem = {
            id: Date.now(),
            name: document.getElementById('p-name').value,
            price: parseInt(document.getElementById('p-price').value),
            desc: document.getElementById('p-desc').value,
            img: tempProdImg
        };
        
        cat.push(newItem);
        db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => {
            alert("Article publié !");
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
        });
    }

    function buyPlan(name, price, limit) {
        if(currentUser.balance < price) return alert("Solde insuffisant");
        if(confirm(`Activer le forfait ${name} (${price} BLL) ?`)) {
            db.ref('accounts/' + currentUser.tel).update({
                balance: currentUser.balance - price,
                limit: limit,
                plan: name
            });
        }
    }

    function handleFile(e, type) {
        const reader = new FileReader();
        reader.onload = () => { tempProdImg = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function renderMarket() {
        // Logique de rendu du marché global...
    }
</script>
</body>
</html>
