<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLOLO MASTER - Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --sidebar-bg: #0f172a; --bg-main: #f1f5f9; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg-main); display: flex; min-height: 100vh; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; font-size: 1.2rem; font-weight: 800; color: var(--primary); border-bottom: 1px solid #1e293b; }
        .nav-item { padding: 15px 25px; color: #94a3b8; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #1e293b; color: white; border-left: 4px solid var(--primary); }

        /* MAIN */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #64748b; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 800; color: #0f172a; }

        /* TABLE */
        .data-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #64748b; border-bottom: 2px solid #f1f5f9; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .user-cell { display: flex; align-items: center; gap: 12px; }
        .u-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* BOUTONS */
        .btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.7rem; margin-right: 5px; transition: 0.2s; }
        .btn-deposit { background: #22c55e; color: white; }
        .btn-quota { background: var(--primary); color: white; }
        .btn-block { background: #ef4444; color: white; }
        .btn-unblock { background: #f59e0b; color: white; }
        .btn-del { background: #f1f5f9; color: #64748b; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; }
        .badge-active { background: #dcfce7; color: #15803d; }
        .badge-blocked { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">BOLOLO MASTER</div>
    <div class="nav-item active">👤 Gérer les Boutiques</div>
</div>

<div class="main-content">
    <header>
        <h1>Tableau de Bord</h1>
        <div style="color: #64748b; font-size: 0.9rem;" id="current-date"></div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><h3>Inscrits</h3><p id="stat-users">0</p></div>
        <div class="stat-card"><h3>Articles Total</h3><p id="stat-articles">0</p></div>
        <div class="stat-card"><h3>Masse BLL</h3><p id="stat-balance">0 BLL</p></div>
        <div class="stat-card"><h3>Bloqués</h3><p id="stat-blocked" style="color:#ef4444">0</p></div>
    </div>

    <div class="data-card">
        <table>
            <thead>
                <tr>
                    <th>BOUTIQUE / TEL</th>
                    <th>SOLDE</th>
                    <th>STATUT & PLAN</th>
                    <th>STOCK / LIMITE</th>
                    <th>ACTIONS ADMINISTRATIVES</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>
</div>

<script>
    // CONFIGURATION FIREBASE
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // DATE
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    function loadAndRefresh() {
        db.ref('accounts').on('value', (snap) => {
            const data = snap.val() || {};
            const accounts = Object.values(data);
            
            // Calcul des stats
            const totalBLL = accounts.reduce((sum, a) => sum + (a.balance || 0), 0);
            const totalArticles = accounts.reduce((sum, a) => sum + (a.catalog ? a.catalog.length : 0), 0);
            const totalBlocked = accounts.filter(a => a.blocked).length;

            document.getElementById('stat-users').innerText = accounts.length;
            document.getElementById('stat-articles').innerText = totalArticles;
            document.getElementById('stat-balance').innerText = totalBLL.toLocaleString() + " BLL";
            document.getElementById('stat-blocked').innerText = totalBlocked;

            // Rendu du tableau
            document.getElementById('user-list').innerHTML = accounts.map((user) => `
                <tr>
                    <td>
                        <div class="user-cell">
                            <img src="${user.shopLogo || 'bololo.png'}" class="u-logo" onerror="this.src='https://via.placeholder.com/45'">
                            <div>
                                <div style="font-weight:700; color:#0f172a;">${user.shopName || 'Boutique sans nom'}</div>
                                <div style="font-size:0.75rem; color:#64748b;">${user.tel}</div>
                            </div>
                        </div>
                    </td>
                    <td><b style="color:var(--primary); font-size:1rem;">${(user.balance || 0).toLocaleString()} BLL</b></td>
                    <td>
                        <div style="margin-bottom:5px;">Plan: <b>${user.plan || 'Gratuit'}</b></div>
                        <span class="badge ${user.blocked ? 'badge-blocked' : 'badge-active'}">
                            ${user.blocked ? '❌ BLOQUÉ' : '✅ ACTIF'}
                        </span>
                    </td>
                    <td>
                        <b>${user.catalog ? user.catalog.length : 0}</b> / <span style="color:var(--primary)">${user.limit || 10}</span>
                    </td>
                    <td>
                        <button class="btn btn-deposit" onclick="makeDeposit('${user.tel}')" title="Créditer">+ BLL</button>
                        <button class="btn btn-quota" onclick="updateQuota('${user.tel}', ${user.limit || 10})" title="Changer la limite">Quota</button>
                        <button class="btn ${user.blocked ? 'btn-unblock' : 'btn-block'}" onclick="toggleBlock('${user.tel}', ${user.blocked})">
                            ${user.blocked ? 'Débloquer' : 'Bloquer'}
                        </button>
                        <button class="btn btn-del" onclick="deleteUser('${user.tel}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        });
    }

    // FONCTION : DEPÔT D'ARGENT
    function makeDeposit(tel) {
        const montant = prompt("Somme à ajouter au portefeuille (BLL) :");
        if (montant && !isNaN(montant)) {
            db.ref('accounts/' + tel + '/balance').transaction(current => (current || 0) + parseInt(montant));
            alert("Versement effectué avec succès !");
        }
    }

    // FONCTION : CHANGER LE QUOTA
    function updateQuota(tel, current) {
        const n = prompt("Nouveau quota d'articles autorisés :", current);
        if (n && !isNaN(n)) {
            db.ref('accounts/' + tel).update({ limit: parseInt(n) });
        }
    }

    // FONCTION : BLOQUER / DEBLOQUER
    function toggleBlock(tel, currentStatus) {
        db.ref('accounts/' + tel).update({ blocked: !currentStatus });
    }

    // FONCTION : SUPPRIMER
    function deleteUser(tel) {
        if(confirm("⚠️ Supprimer définitivement cette boutique et tous ses articles ?")) {
            db.ref('accounts/' + tel).remove();
        }
    }

    // Lancement initial
    loadAndRefresh();
</script>
</body>
</html>
