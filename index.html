<!DOCTYPE html>
<html lang="fr">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BololoShop">
    <link rel="apple-touch-icon" href="bololo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body.theme-glamour { --primary: #a855f7; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; }
        body.theme-feminin { --primary: #ec4899; --glam: linear-gradient(135deg, #f472b6 0%, #ec4899 100%); --bg: #fff1f2; }
        body.theme-masculin { --primary: #0ea5e9; --glam: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); --bg: #f0f9ff; }
        body.theme-dark { --primary: #64748b; --glam: linear-gradient(135deg, #334155 0%, #0f172a 100%); --bg: #1e293b; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); overscroll-behavior: none; }

        .iphone-xs-screen { width: 100%; max-width: 400px; height: 100vh; background: white; display: flex; flex-direction: column; overflow: hidden; position: relative; border: none; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { background: var(--glam); color: white; padding: 60px 20px 20px; text-align: center; font-weight: bold; font-size: 1.1rem; position: relative; z-index: 1000; }

        .btn-logout { position: absolute; right: 15px; bottom: 18px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; font-weight: bold; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); position: relative; }
        
        /* --- ZONE STATIQUE (FIXE AU SCROLL) --- */
        .sticky-area { position: sticky; top: -20px; background: var(--bg); z-index: 500; padding: 10px 0; border-bottom: 2px solid #ddd; margin-bottom: 15px; }
        
        .search-container { position: relative; margin-bottom: 10px; }
        .autocomplete-results { position: absolute; top: 45px; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 1100; max-height: 200px; overflow-y: auto; border: 1px solid #eee; }
        
        /* --- STORIES --- */
        .story-container { display: flex; gap: 12px; overflow-x: auto; padding: 5px 0 10px; scrollbar-width: none; }
        .story-container::-webkit-scrollbar { display: none; }
        .story-circle { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--primary); padding: 2px; object-fit: cover; background: white; flex-shrink: 0; }
        
        /* --- MODAL / INFO-BULLE --- */
        .modal-info { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; max-width: 320px; text-align: center; color: #1e293b; position: relative; }
        .btn-close-modal { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-top: 15px; cursor: pointer; font-weight: bold; }

        .product-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; color: #1e293b; }
        .product-img-display { width: 100%; height: auto; max-height: 450px; object-fit: contain; display: block; }
        
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 25px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        
        .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: bold; }
        .badge-vendeur { background: var(--primary); color: white; }
    </style>
</head>
<body class="theme-glamour">

<div id="info-modal" class="modal-info">
    <div class="modal-content">
        <h3 style="margin-top:0">💡 Aide & Sécurité</h3>
        <p id="info-msg" style="font-size: 13px; line-height: 1.5; text-align: left;"></p>
        <button class="btn-close-modal" onclick="closeInfo()">COMPRIS</button>
    </div>
</div>

<div class="iphone-xs-screen">
    <header>
        <span id="title-text">BOLOLO Pro</span>
        <button id="logout-btn" class="btn-logout hidden" onclick="location.reload()">SORTIR</button>
    </header>
    
    <div class="content" id="main-content">
        <div id="view-auth">
            <div class="tab-bar" style="display:flex; gap:5px; margin-bottom:25px; border-bottom:1px solid #eee;">
                <span id="t-login" class="tab-item active" style="flex:1; text-align:center; padding:12px; cursor:pointer; font-weight:bold; font-size:0.7rem;" onclick="switchTab('login')">LOGIN</span>
                <span id="t-signup" class="tab-item" style="flex:1; text-align:center; padding:12px; cursor:pointer; font-weight:bold; font-size:0.7rem; color:#999;" onclick="switchTab('signup')">CREER</span>
            </div>
            <div id="area-login">
                <input type="tel" id="l-tel" placeholder="Numéro de téléphone">
                <input type="password" id="l-pass" placeholder="Mot de passe">
                <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
            </div>
            <div id="area-signup" class="hidden">
                <input type="tel" id="s-tel" placeholder="Votre numéro" oninput="drawQR('s-tel', 'qr-signup')">
                <center><div id="qr-signup" class="qr-box"></div></center>
                <input type="password" id="s-pass" placeholder="Mot de passe">
                <input type="password" id="s-confirm" placeholder="Confirmer">
                <button class="btn-action" onclick="doSignup()">CREER LE COMPTE</button>
            </div>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center;">
                <div id="qr-admin" class="qr-box"></div>
            </div>
            <div class="card">
                <input type="text" id="set-name" placeholder="Nom de la Boutique">
                <input type="file" accept="image/*" onchange="handleLogo(event)">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <input type="text" id="p-name" placeholder="Nom Article">
                <input type="number" id="p-price" placeholder="Prix (FCFA)">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" id="p-img-input" accept="image/*" onchange="handleProdImg(event)">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <div id="admin-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="sticky-area">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Chercher une boutique..." oninput="autoComplete(this.value)">
                    <div id="suggest-box" class="autocomplete-results hidden"></div>
                </div>
                
                <div id="user-stories" class="story-container"></div>
                
                <div id="shop-header"></div>
            </div>
            
            <div id="shop-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item active" onclick="showSection('params', this)">⚙️<br>CONFIG</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>ARTICLES</div>
        <div class="nav-item" onclick="showSection('view', this); viewCurrentShop();">🛒<br>VUE</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let viewedTel = "";
    let tempLogo = "";
    let tempProdImg = "";

    const MSG_AVERTISSEMENT = `⚠️ <b>AVERTISSEMENT IMPORTANT</b> ⚠️<br><br>Cette application est une plateforme de mise en relation entre vendeurs et clients.<br><br>👉 Les transactions (paiement, livraison, échange d’argent) sont effectuées directement entre le vendeur et le client.<br><br>👉 L’entreprise éditrice n’intervient pas dans les paiements ni dans les livraisons.<br><br>👉 Elle n’est pas responsable des pertes, arnaques, retards ou litiges.`;

    function showInfo() {
        document.getElementById('info-msg').innerHTML = MSG_AVERTISSEMENT;
        document.getElementById('info-modal').style.display = 'flex';
    }

    function closeInfo() { document.getElementById('info-modal').style.display = 'none'; }

    function switchTab(t) {
        document.getElementById('area-login').classList.toggle('hidden', t !== 'login');
        document.getElementById('area-signup').classList.toggle('hidden', t !== 'signup');
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'view') renderStories();
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value;
        const pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', (snap) => {
            const user = snap.val();
            if (!user || user.pass !== pass) return alert("Erreur");
            currentUser = user; viewedTel = tel;
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('bottom-nav').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            showSection('params', document.querySelector('.nav-item'));
            new QRCode(document.getElementById('qr-admin'), { text: user.tel, width: 140, height: 140 });
            renderAdminList();
        });
    }

    function renderStories() {
        db.ref('accounts').once('value', snap => {
            const users = snap.val();
            const storyArea = document.getElementById('user-stories');
            storyArea.innerHTML = Object.values(users).map(u => `
                <img src="${u.shopLogo || 'bololo.png'}" class="story-circle" onclick="selectShop('${u.tel}')">
            `).join('');
        });
    }

    function selectShop(tel) { 
        viewedTel = tel; 
        document.getElementById('suggest-box').classList.add('hidden'); 
        renderShop(); 
    }

    function renderShop() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const u = snap.val();
            if(!u) return;
            
            // Header Statique avec bouton Info-bulle
            document.getElementById('shop-header').innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; background:white; padding:10px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                    <img src="${u.shopLogo || 'bololo.png'}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;">
                    <div style="flex:1">
                        <h4 style="margin:0">${u.shopName || 'Boutique'} <span onclick="showInfo()" style="cursor:pointer; font-size:18px; margin-left:5px;">💡</span></h4>
                        <small>${u.tel}</small>
                    </div>
                </div>`;

            const catalog = u.catalog || [];
            document.getElementById('shop-list').innerHTML = catalog.map((it, i) => `
                <div class="product-card">
                    <img src="${it.img || ''}" class="product-img-display">
                    <div style="padding:15px;">
                        <b>${it.name}</b><br><span style="color:var(--primary); font-weight:bold;">${it.price} FCFA</span>
                        <p style="font-size:12px; color:#666;">${it.desc || ''}</p>
                    </div>
                </div>`).join('');
        });
    }

    // Fonctions manquantes pour la démo
    function drawQR(id, cont) { new QRCode(document.getElementById(cont), document.getElementById(id).value); }
    function handleLogo(e) { const r = new FileReader(); r.onload = () => tempLogo = r.result; r.readAsDataURL(e.target.files[0]); }
    function saveSettings() { db.ref('accounts/'+currentUser.tel).update({shopName: document.getElementById('set-name').value, shopLogo: tempLogo}).then(()=>alert("OK")); }
    function handleProdImg(e) { const r = new FileReader(); r.onload = () => tempProdImg = r.result; r.readAsDataURL(e.target.files[0]); }
    function addProduct() { 
        db.ref('accounts/'+currentUser.tel+'/catalog').once('value', s => {
            let cat = s.val() || [];
            cat.push({name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, img: tempProdImg});
            db.ref('accounts/'+currentUser.tel+'/catalog').set(cat).then(()=>renderAdminList());
        });
    }
    function renderAdminList() { 
        db.ref('accounts/'+currentUser.tel+'/catalog').on('value', s => {
            document.getElementById('admin-list').innerHTML = (s.val()||[]).map(it => `<div class="card">${it.name}</div>`).join('');
        });
    }
    function viewCurrentShop() { viewedTel = currentUser.tel; renderShop(); }
    function autoComplete(v) { /* identique au code precedent */ }
</script>
</body>
</html>
