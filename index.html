<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Ultra Business</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #4f46e5; --accent: #ec4899; --bg: #f3f4f6; --text: #111827;
            --male-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --female-gradient: linear-gradient(135deg, #831843 0%, #db2777 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', system-ui, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

        .app-shell {
            width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }

        /* HEADER COMMERCIAL */
        header { 
            background: var(--male-gradient); color: white; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 100; transition: 0.5s;
        }
        header.theme-female { background: var(--female-gradient); }
        .btn-exit { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 12px; font-weight: bold; }

        .main-content { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; }
        .main-content::-webkit-scrollbar { display: none; }

        /* CARDS E-COMMERCE */
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .product-item { background: white; border-radius: 24px; overflow: hidden; margin-bottom: 25px; border: 1px solid #e5e7eb; }
        .img-wrap { width: 100%; height: 280px; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .badge-price { position: absolute; top: 15px; right: 15px; background: var(--primary); color: white; padding: 8px 15px; border-radius: 50px; font-weight: 800; font-size: 1.1rem; }

        /* CHAT VENDREUR / CLIENT */
        .chat-box { background: #f9fafb; border-radius: 15px; padding: 10px; margin-top: 15px; border: 1px dashed #d1d5db; }
        .message { font-size: 0.85rem; margin-bottom: 5px; padding: 8px; border-radius: 10px; }
        .msg-client { background: #e0e7ff; text-align: right; }
        .msg-vendor { background: #f3f4f6; text-align: left; }

        /* BOUTONS ACTIONS */
        .btn-buy { background: #10b981; color: white; border: none; padding: 16px; width: 100%; border-radius: 18px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .btn-send { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0 15px; }

        /* NAV */
        nav { background: white; display: flex; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #e5e7eb; }
        .nav-tab { flex: 1; text-align: center; color: #9ca3af; font-size: 0.75rem; font-weight: 600; text-decoration: none; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab i { font-size: 1.5rem; display: block; margin-bottom: 2px; }

        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-size: 1rem; outline: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-shell">
    <header id="app-header">
        <h2>BOLOLO <span style="font-weight: 200;">BUSINESS</span></h2>
        <button id="logout-btn" class="btn-exit hidden" onclick="location.reload()">Quitter</button>
    </header>

    <div class="main-content">
        <div id="view-login" class="card">
            <h2 style="text-align:center">Connexion Pro</h2>
            <input type="tel" id="l-tel" placeholder="N° Téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-buy" style="background:var(--primary)" onclick="doLogin()">ACCÉDER À L'ESPACE</button>
            <p onclick="switchAuth('signup')" style="text-align:center; color:var(--primary); cursor:pointer; font-weight:bold; margin-top:20px;">Ouvrir une boutique</p>
        </div>

        <div id="view-signup" class="card hidden">
            <h2 style="text-align:center">Nouvelle Boutique</h2>
            <input type="tel" id="s-tel" placeholder="Numéro officiel" oninput="genQR(this.value)">
            <center><div id="qr-area" style="margin-bottom:15px;"></div></center>
            <input type="password" id="s-pass" placeholder="Mot de passe">
            <button class="btn-buy" style="background:var(--primary)" onclick="doSignup()">CRÉER MA VITRINE</button>
            <p onclick="switchAuth('login')" style="text-align:center; color:var(--primary); cursor:pointer; margin-top:20px;">Déjà membre ?</p>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="background:var(--primary); color:white; text-align:center;">
                <small>MON CHIFFRE D'AFFAIRES</small>
                <h1 id="user-balance" style="margin:5px 0">0 BLL</h1>
            </div>
            <div class="card">
                <h3>Style de la boutique</h3>
                <label>Genre du thème :</label>
                <select id="set-theme" onchange="updateTheme(this.value)">
                    <option value="male">Homme (Bleu Business)</option>
                    <option value="female">Femme (Rose Glamour)</option>
                </select>
                <label>Nom Commercial :</label>
                <input type="text" id="set-name" placeholder="Nom de l'entreprise">
                <input type="file" accept="image/*" onchange="handleFile(event, 'logo')">
                <button class="btn-buy" style="background:var(--primary)" onclick="saveProfile()">METTRE À JOUR LA VITRINE</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <h3>Ajouter un Article</h3>
                <input type="text" id="p-name" placeholder="Nom du produit">
                <input type="number" id="p-price" placeholder="Prix Vente (BLL)">
                <textarea id="p-desc" placeholder="Caractéristiques et détails..."></textarea>
                <input type="file" accept="image/*" onchange="handleFile(event, 'prod')">
                <button class="btn-buy" onclick="addProduct()">PUBLIER L'ANNONCE</button>
            </div>
            <div id="my-list"></div>
        </div>

        <div id="dash-view" class="hidden">
            <input type="text" id="search" placeholder="🔍 Rechercher une boutique ou un produit..." oninput="searchShop(this.value)">
            <div id="search-res" class="hidden" style="background:white; border-radius:12px; margin-bottom:10px; border:1px solid #ddd;"></div>

            <div class="card" style="display:flex; align-items:center; gap:15px; padding:12px; border-left: 5px solid var(--primary);">
                <img id="v-logo" src="bololo.png" style="width:60px; height:60px; border-radius:15px; object-fit:cover;">
                <div>
                    <b id="v-name" style="font-size:1.2rem;">...</b><br>
                    <small id="v-tel" style="color:#6b7280"></small>
                </div>
            </div>
            <div id="market-list"></div>
        </div>
    </div>

    <nav id="navbar" class="hidden">
        <div class="nav-tab active" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-tab" onclick="showSection('articles', this); renderMyStock();">📦<br>STOCK</div>
        <div class="nav-tab" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, tempLogo = "", tempProd = "", currentShopTel = "";

    function switchAuth(m) {
        document.getElementById('view-login').classList.toggle('hidden', m==='signup');
        document.getElementById('view-signup').classList.toggle('hidden', m==='login');
    }

    function genQR(v) {
        const area = document.getElementById('qr-area'); area.innerHTML = "";
        if(v.length > 2) new QRCode(area, { text: v, width: 90, height: 90 });
    }

    function doSignup() {
        const tel = document.getElementById('s-tel').value, pass = document.getElementById('s-pass').value;
        db.ref('accounts/'+tel).set({ tel, pass, balance: 2000, theme: 'male', shopName: "Boutique "+tel, shopLogo: "", catalog: [] })
        .then(() => { alert("Boutique créée !"); switchAuth('login'); });
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value, pass = document.getElementById('l-pass').value;
        db.ref('accounts/'+tel).once('value', s => {
            const data = s.val();
            if(data && data.pass === pass) {
                user = data; currentShopTel = tel;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
                updateTheme(user.theme || 'male');
                showSection('params', document.querySelectorAll('.nav-tab')[0]);
                syncData();
            } else alert("Erreur identifiants");
        });
    }

    function updateTheme(t) {
        const h = document.getElementById('app-header');
        h.className = (t === 'female') ? 'theme-female' : '';
        document.documentElement.style.setProperty('--primary', t === 'female' ? '#db2777' : '#4f46e5');
    }

    function syncData() {
        db.ref('accounts/'+user.tel).on('value', s => {
            user = s.val();
            document.getElementById('user-balance').innerText = (user.balance || 0) + " BLL";
            document.getElementById('set-name').value = user.shopName;
            document.getElementById('set-theme').value = user.theme || 'male';
        });
    }

    // --- MARCHÉ DYNAMIQUE ---
    function renderMarket() {
        db.ref('accounts/'+currentShopTel).on('value', s => {
            const shop = s.val();
            document.getElementById('v-name').innerText = shop.shopName;
            document.getElementById('v-tel').innerText = "Contact : " + currentShopTel;
            document.getElementById('v-logo').src = shop.shopLogo || 'bololo.png';
            
            let h = "";
            (shop.catalog || []).forEach((it, i) => {
                h += `
                <div class="product-item">
                    <div class="img-wrap">
                        <img src="${it.img || 'bololo.png'}" class="product-img">
                        <span class="badge-price">${it.price} BLL</span>
                    </div>
                    <div style="padding:15px;">
                        <h3 style="margin:0">${it.name}</h3>
                        <p style="color:#6b7280; font-size:0.85rem;">${it.desc || ''}</p>
                        
                        <div class="chat-box" id="chat-${i}">
                            ${(it.messages || []).map(m => `<div class="message ${m.sender==='V'?'msg-vendor':'msg-client'}"><b>${m.user}:</b> ${m.text}</div>`).join('')}
                        </div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input type="text" id="msg-in-${i}" placeholder="Discuter avec le vendeur..." style="margin:0; font-size:0.8rem;">
                            <button class="btn-send" onclick="sendMsg('${currentShopTel}', ${i})">✈️</button>
                        </div>
                        
                        <button class="btn-buy" onclick="buyItem('${currentShopTel}', ${it.price}, '${it.name}')">ACHETER MAINTENANT</button>
                    </div>
                </div>`;
            });
            document.getElementById('market-list').innerHTML = h || "<center style='padding:50px;'>Aucun article</center>";
        });
    }

    function sendMsg(seller, idx) {
        const txt = document.getElementById('msg-in-'+idx).value; if(!txt) return;
        db.ref('accounts/'+seller+'/catalog/'+idx+'/messages').once('value', s => {
            let m = s.val() || [];
            m.push({ user: user.shopName, text: txt, sender: (seller === user.tel ? 'V' : 'C') });
            db.ref('accounts/'+seller+'/catalog/'+idx+'/messages').set(m).then(() => {
                document.getElementById('msg-in-'+idx).value = "";
            });
        });
    }

    function buyItem(seller, price, name) {
        if(seller === user.tel) return alert("C'est votre boutique !");
        if(user.balance < price) return alert("Solde insuffisant");
        if(confirm("Acheter "+name+" ?")) {
            db.ref('accounts/'+user.tel+'/balance').transaction(b => b - price);
            db.ref('accounts/'+seller+'/balance').transaction(b => (b || 0) + price);
            alert("Paiement effectué !");
        }
    }

    // --- STOCK ---
    function addProduct() {
        const cat = user.catalog || [];
        cat.push({ name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), desc: document.getElementById('p-desc').value, img: tempProd, messages: [] });
        db.ref('accounts/'+user.tel+'/catalog').set(cat).then(() => {
            alert("Article publié !");
            renderMyStock();
        });
    }

    function renderMyStock() {
        const cat = user.catalog || [];
        document.getElementById('my-list').innerHTML = cat.map((it, i) => `
            <div class="card" style="display:flex; align-items:center; gap:12px; padding:10px;">
                <img src="${it.img || 'bololo.png'}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
                <div style="flex:1"><b>${it.name}</b><br><small>${it.price} BLL</small></div>
                <button onclick="delItem(${i})" style="color:red; border:none; background:none; font-weight:bold;">🗑️</button>
            </div>
        `).join('');
    }

    function delItem(i) {
        if(confirm("Supprimer l'article ?")) {
            let cat = [...user.catalog]; cat.splice(i,1);
            db.ref('accounts/'+user.tel+'/catalog').set(cat);
        }
    }

    // --- SYSTEM ---
    function searchShop(v) {
        const res = document.getElementById('search-res');
        if(!v) return res.classList.add('hidden');
        db.ref('accounts').once('value', s => {
            let all = s.val(), h = "";
            for(let t in all) if(all[t].shopName.toLowerCase().includes(v.toLowerCase())) h += `<div onclick="goShop('${t}')" style="padding:15px; border-bottom:1px solid #eee;">${all[t].shopName}</div>`;
            res.innerHTML = h; res.classList.remove('hidden');
        });
    }

    function goShop(t) { currentShopTel = t; document.getElementById('search-res').classList.add('hidden'); renderMarket(); }
    function handleFile(e, type) { const r = new FileReader(); r.onload = () => { if(type==='logo') tempLogo=r.result; else tempProd=r.result; }; r.readAsDataURL(e.target.files[0]); }
    function saveProfile() { 
        const t = document.getElementById('set-theme').value;
        db.ref('accounts/'+user.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo || user.shopLogo, theme: t })
        .then(() => { updateTheme(t); alert("Profil à jour !"); });
    }

    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
