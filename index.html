<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOLOLO Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #6366f1; --glam: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); --bg: #f1f5f9; --text: #1e293b; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text); }
        .iphone-xs-screen { width: 375px; height: 812px; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { background: var(--glam); color: white; padding: 55px 20px 15px; text-align: center; font-weight: bold; position: relative; }
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg); }
        
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }

        /* BOUTON DÉCONNEXION & RECHERCHE */
        .market-header { position: sticky; top: -20px; background: var(--bg); z-index: 100; padding-bottom: 10px; }
        .search-container { display: flex; gap: 8px; align-items: center; }
        .btn-logout { background: #ef4444; color: white; border: none; border-radius: 12px; padding: 10px; cursor: pointer; }

        /* IMAGES & ACHAT */
        .img-container { width: 100%; height: 250px; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-buy-mini { background: #22c55e; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .btn-action { background: var(--glam); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0 34px; } 
        .nav-item { flex: 1; text-align: center; font-size: 0.65rem; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .nav-item.active { color: var(--primary); }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .plan-btn { border: none; padding: 12px; border-radius: 12px; color: white; font-weight: bold; margin-bottom: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="iphone-xs-screen">
    <header>BOLOLO Pro</header>
    
    <div class="content">
        <div id="view-login">
            <h2 style="text-align:center;">Connexion</h2>
            <input type="tel" id="l-tel" placeholder="Téléphone">
            <input type="password" id="l-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doLogin()">SE CONNECTER</button>
            <p onclick="switchAuth('signup')" style="text-align:center; color:var(--primary); cursor:pointer;">Créer un compte</p>
        </div>

        <div id="view-signup" class="hidden">
            <h2 style="text-align:center;">Inscription</h2>
            <input type="tel" id="s-tel" placeholder="Numéro" oninput="generateQR(this.value)">
            <center><div id="qr-signup" style="background:white; padding:10px; margin-bottom:10px;"></div></center>
            <input type="password" id="s-pass" placeholder="Mot de passe">
            <button class="btn-action" onclick="doSignup()">S'INSCRIRE</button>
        </div>

        <div id="dash-params" class="hidden">
            <div class="card" style="text-align:center; background: var(--glam); color:white;">
                <h1 id="user-balance">0 BLL</h1>
                <p>SOLDE ACTUEL</p>
            </div>
            <div class="card">
                <h3>Ma Boutique</h3>
                <input type="file" accept="image/*" onchange="handleFile(event, 'logo')">
                <input type="text" id="set-name" placeholder="Nom entreprise">
                <button class="btn-action" onclick="saveSettings()">ENREGISTRER</button>
            </div>
            <div class="card">
                <h3>Acheter un Forfait</h3>
                <button class="plan-btn" style="background:#cd7f32" onclick="buyPlan('Bronze', 500, 20)">BRONZE (500 BLL) - 20 art.</button>
                <button class="plan-btn" style="background:#c0c0c0" onclick="buyPlan('Argent', 1200, 50)">ARGENT (1200 BLL) - 50 art.</button>
                <button class="plan-btn" style="background:#ffd700; color:black" onclick="buyPlan('Or', 3000, 100)">OR (3000 BLL) - 100 art.</button>
            </div>
        </div>

        <div id="dash-articles" class="hidden">
            <div class="card">
                <h3>Publier</h3>
                <input type="text" id="p-name" placeholder="Nom">
                <input type="number" id="p-price" placeholder="Prix">
                <textarea id="p-desc" placeholder="Description..."></textarea>
                <input type="file" accept="image/*" onchange="handleFile(event, 'prod')">
                <button class="btn-action" onclick="addProduct()">PUBLIER</button>
            </div>
            <h4>Mes articles</h4>
            <div id="my-list-container"></div>
        </div>

        <div id="dash-view" class="hidden">
            <div class="market-header">
                <div class="search-container">
                    <input type="text" id="search-box" placeholder="Chercher boutique..." oninput="autoSearch(this.value)" style="margin-bottom:0;">
                    <button class="btn-logout" onclick="location.reload()">🚪</button>
                </div>
                <div id="search-results" class="hidden" style="background:white; border:1px solid #ddd; border-radius:10px; position:absolute; width:80%; z-index:100;"></div>
                
                <div class="card" style="display:flex; align-items:center; gap:10px; margin-top:10px; padding:8px;">
                    <img id="m-logo" src="bololo.png" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <div style="flex:1"><b id="m-name" style="font-size:0.8rem;">Boutique</b><br><small id="m-tel"></small></div>
                </div>
            </div>
            <div id="market-list"></div>
        </div>
    </div>

    <nav id="bottom-nav" class="nav-bar hidden">
        <div class="nav-item" onclick="showSection('params', this)">⚙️<br>PROFIL</div>
        <div class="nav-item" onclick="showSection('articles', this)">📦<br>AJOUTER</div>
        <div class="nav-item" onclick="showSection('view', this); renderMarket();">🛒<br>MARCHÉ</div>
    </nav>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bololoshop-bf59b-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null, tempLogo = "", tempProd = "", viewedTel = "";

    function generateQR(v) { document.getElementById('qr-signup').innerHTML = ""; if(v.length > 2) new QRCode(document.getElementById('qr-signup'), { text: v, width: 80, height: 80 }); }

    function doSignup() {
        const tel = document.getElementById('s-tel').value, pass = document.getElementById('s-pass').value;
        db.ref('accounts/' + tel).set({ tel, pass, balance: 1000, limit: 5, shopName: "Boutique "+tel, shopLogo: "", catalog: [] }).then(() => switchAuth('login'));
    }

    function doLogin() {
        const tel = document.getElementById('l-tel').value, pass = document.getElementById('l-pass').value;
        db.ref('accounts/' + tel).once('value', snap => {
            const u = snap.val();
            if(u && u.pass === pass) {
                currentUser = u; viewedTel = tel;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                showSection('params', document.querySelectorAll('.nav-item')[0]);
                syncData();
            } else alert("Erreur");
        });
    }

    function syncData() {
        db.ref('accounts/' + currentUser.tel).on('value', snap => {
            currentUser = snap.val();
            document.getElementById('user-balance').innerText = currentUser.balance + " BLL";
            document.getElementById('set-name').value = currentUser.shopName;
            renderMyArticles();
        });
    }

    // --- LOGIQUE DE TRANSACTION (ACHAT) ---
    function buyNow(prodName, price, sellerTel) {
        if (currentUser.tel === sellerTel) return alert("Vous ne pouvez pas acheter votre propre produit !");
        
        if (currentUser.balance < price) {
            alert("❌ ACHAT IMPOSSIBLE : Solde insuffisant (" + currentUser.balance + " BLL)");
            return;
        }

        if (confirm(`Confirmer l'achat de "${prodName}" pour ${price} BLL ?`)) {
            // 1. Débiter le client
            const newClientBalance = currentUser.balance - price;
            
            // 2. Créditer le vendeur
            db.ref('accounts/' + sellerTel + '/balance').once('value', s => {
                const newSellerBalance = (s.val() || 0) + price;
                
                // Mises à jour Firebase
                db.ref('accounts/' + currentUser.tel).update({ balance: newClientBalance });
                db.ref('accounts/' + sellerTel).update({ balance: newSellerBalance });
                
                alert("✅ ACHAT RÉUSSI !\n" + price + " BLL ont été transférés au vendeur.");
            });
        }
    }

    // --- FORFAITS ---
    function buyPlan(name, price, limit) {
        if(currentUser.balance < price) return alert("Solde insuffisant pour ce forfait");
        if(confirm(`Activer le forfait ${name} (${price} BLL) ?`)) {
            db.ref('accounts/' + currentUser.tel).update({
                balance: currentUser.balance - price,
                limit: limit
            });
        }
    }

    function renderMarket() {
        db.ref('accounts/' + viewedTel).on('value', snap => {
            const shop = snap.val();
            document.getElementById('m-name').innerText = shop.shopName;
            document.getElementById('m-tel').innerText = viewedTel;
            document.getElementById('m-logo').src = shop.shopLogo || 'bololo.png';
            let h = "";
            (shop.catalog || []).forEach((it, i) => {
                h += `
                <div class="card" style="padding:0; overflow:hidden;">
                    <div class="img-container"><img src="${it.img || 'bololo.png'}" class="product-img"></div>
                    <div style="padding:15px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div><b>${it.name}</b><br><b style="color:var(--primary); font-size:1.1rem;">${it.price} BLL</b></div>
                            <button class="btn-buy-mini" onclick="buyNow('${it.name}', ${it.price}, '${viewedTel}')">🛒</button>
                        </div>
                        <p style="font-size:0.7rem; color:gray;">${it.desc || ''}</p>
                    </div>
                </div>`;
            });
            document.getElementById('market-list').innerHTML = h || "<center>Boutique vide</center>";
        });
    }

    function addProduct() {
        const cat = currentUser.catalog || [];
        if(cat.length >= (currentUser.limit || 5)) return alert("Quota atteint ! Achetez un forfait.");
        cat.push({ id: Date.now(), name: document.getElementById('p-name').value, price: parseInt(document.getElementById('p-price').value), desc: document.getElementById('p-desc').value, img: tempProd, likes:0, comments:[] });
        db.ref('accounts/' + currentUser.tel + '/catalog').set(cat).then(() => alert("Produit en ligne !"));
    }

    function renderMyArticles() {
        const cat = currentUser.catalog || []; let h = "";
        cat.forEach((it, i) => { h += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; background:white; padding:8px; border-radius:10px;">
            <img src="${it.img || 'bololo.png'}" style="width:40px; height:40px; object-fit:cover;">
            <div style="flex:1"><b>${it.name}</b></div>
            <button onclick="deleteItem(${i})" style="color:red; border:none; background:none;">🗑️</button>
        </div>`; });
        document.getElementById('my-list-container').innerHTML = h;
    }

    function deleteItem(i) {
        if(confirm("Supprimer ?")) {
            let cat = [...currentUser.catalog]; cat.splice(i, 1);
            db.ref('accounts/' + currentUser.tel + '/catalog').set(cat);
        }
    }

    function autoSearch(v) {
        const res = document.getElementById('search-results');
        if(!v) return res.classList.add('hidden');
        db.ref('accounts').once('value', s => {
            let all = s.val(), h = "";
            for(let t in all) if(all[t].shopName.toLowerCase().includes(v.toLowerCase())) h += `<div onclick="viewShop('${t}')" style="padding:10px; border-bottom:1px solid #eee;">${all[t].shopName}</div>`;
            res.innerHTML = h; res.classList.remove('hidden');
        });
    }

    function viewShop(t) { viewedTel = t; document.getElementById('search-results').classList.add('hidden'); renderMarket(); }
    function handleFile(e, type) { const r = new FileReader(); r.onload = () => { if(type==='logo') tempLogo=r.result; else tempProd=r.result; }; r.readAsDataURL(e.target.files[0]); }
    function saveSettings() { db.ref('accounts/' + currentUser.tel).update({ shopName: document.getElementById('set-name').value, shopLogo: tempLogo || currentUser.shopLogo }); }
    function switchAuth(m) { document.getElementById('view-login').classList.toggle('hidden', m==='signup'); document.getElementById('view-signup').classList.toggle('hidden', m==='login'); }
    function showSection(id, el) {
        ['params', 'articles', 'view'].forEach(s => document.getElementById('dash-'+s).classList.add('hidden'));
        document.getElementById('dash-'+id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
